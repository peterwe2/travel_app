<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🏝 2026沖繩週年之旅</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --ocean: #0077b6; --sky: #48cae4; --coral: #f77f00;
      --green: #52b788; --dark: #023e58; --white: #fff;
      --bg: #f0f8ff; --border: #e2e8f0; --text: #1a202c;
      --muted: #64748b; --shadow: 0 2px 12px rgba(0,0,0,.08);
      --shadow-lg: 0 8px 32px rgba(0,0,0,.14); --radius: 14px; --radius-sm: 8px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI','PingFang TC','Microsoft JhengHei',system-ui,sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── OVERLAY / MODAL ── */
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.55); display: flex; align-items: center; justify-content: center; z-index: 900; }
    .overlay.hidden { display: none; }
    .modal-box { background: #fff; border-radius: 20px; padding: 2rem; width: min(460px,94vw); max-height: 92vh; overflow-y: auto; box-shadow: var(--shadow-lg); animation: popIn .22s ease; }
    @keyframes popIn { from{transform:scale(.93);opacity:0} to{transform:scale(1);opacity:1} }
    .modal-title { font-size: 1.15rem; font-weight: 800; color: var(--dark); margin-bottom: 1.2rem; }
    .modal-footer { display: flex; gap: .6rem; justify-content: flex-end; margin-top: 1.1rem; border-top: 1px solid var(--border); padding-top: .9rem; }

    /* ── FORM ── */
    .form-group { margin-bottom: .9rem; }
    .form-group label { display: block; font-size: .8rem; font-weight: 600; color: var(--muted); margin-bottom: .3rem; }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; padding: .55rem .85rem; border: 1.5px solid var(--border);
      border-radius: var(--radius-sm); font-size: .92rem; font-family: inherit;
      background: #fff; transition: border-color .2s;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: var(--ocean); }
    .form-group textarea { resize: vertical; min-height: 68px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; }

    /* ── BUTTONS ── */
    .btn { padding: .55rem 1.3rem; border-radius: var(--radius-sm); border: none; font-size: .88rem; font-weight: 600; cursor: pointer; transition: all .18s; }
    .btn-primary { background: var(--ocean); color: #fff; }
    .btn-primary:hover { background: var(--dark); }
    .btn-danger { background: #fee2e2; color: #dc2626; }
    .btn-danger:hover { background: #fecaca; }
    .btn-ghost { background: #f1f5f9; color: var(--muted); }
    .btn-ghost:hover { background: #e2e8f0; }
    .btn-sm { padding: .32rem .75rem; font-size: .78rem; }
    .btn-full { width: 100%; margin-top: .4rem; }

    /* ── COLOR PICKER ── */
    .color-row { display: flex; gap: .45rem; flex-wrap: wrap; margin-top: .4rem; }
    .swatch { width: 26px; height: 26px; border-radius: 50%; border: 2.5px solid transparent; cursor: pointer; transition: transform .15s; }
    .swatch.sel { border-color: #1a202c; transform: scale(1.2); }

    /* ── HEADER ── */
    header { background: linear-gradient(135deg,var(--dark) 0%,var(--ocean) 55%,var(--sky) 100%); color: #fff; padding: 1.2rem 1.5rem .9rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap; }
    .hdr-title { font-size: 1.35rem; font-weight: 800; letter-spacing: 1px; }
    .hdr-sub { font-size: .78rem; opacity: .8; }
    .presence-bar { display: flex; gap: .35rem; align-items: center; flex-wrap: wrap; }
    .p-dot { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: .72rem; font-weight: 700; color: #fff; border: 2px solid rgba(255,255,255,.45); position: relative; cursor: default; flex-shrink: 0; }
    .p-dot::after { content:''; position: absolute; bottom:-1px; right:-1px; width:9px; height:9px; border-radius:50%; background:#4ade80; border:1.5px solid #fff; }
    .p-label { font-size: .72rem; opacity: .65; }

    /* ── TABS ── */
    .tabs-wrap { position: sticky; top: 0; z-index: 100; background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,.08); overflow-x: auto; scrollbar-width: none; }
    .tabs-wrap::-webkit-scrollbar { display: none; }
    .tabs { display: flex; min-width: max-content; }
    .tab-btn { padding: .8rem 1.2rem; border: none; background: none; font-size: .82rem; font-weight: 600; color: var(--muted); cursor: pointer; border-bottom: 3px solid transparent; transition: all .2s; white-space: nowrap; line-height: 1.35; }
    .tab-btn:hover { color: var(--ocean); }
    .tab-btn.active { color: var(--ocean); border-bottom-color: var(--ocean); background: #f0f8ff; }

    /* ── MAIN ── */
    main { max-width: 860px; margin: 0 auto; padding: 1.4rem 1rem 5rem; }
    .panel { display: none; }
    .panel.active { display: block; animation: fadeUp .28s ease; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none} }

    /* Day hero */
    .day-hero { border-radius: var(--radius); padding: 1.3rem 1.6rem; color: #fff; margin-bottom: 1.4rem; display: flex; align-items: center; justify-content: space-between; gap: .8rem; flex-wrap: wrap; }
    .day-hero h2 { font-size: 1.2rem; font-weight: 800; }
    .day-hero p  { font-size: .85rem; opacity: .85; margin-top: .18rem; }
    .btn-route { background: rgba(255,255,255,.18); color: #fff; border: 1px solid rgba(255,255,255,.4); white-space: nowrap; }
    .btn-route:hover { background: rgba(255,255,255,.3); }

    /* ── TIMELINE ── */
    .timeline { position: relative; }
    .timeline::before { content:''; position:absolute; left:50px; top:0; bottom:0; width:2px; background:linear-gradient(to bottom,var(--ocean),var(--green),var(--sky)); border-radius:2px; }
    .tl-item { display: flex; gap: .9rem; margin-bottom: .9rem; }
    .tl-time { width: 44px; flex-shrink: 0; text-align: right; font-size: .72rem; font-weight: 700; color: var(--muted); padding-top: 1.05rem; line-height: 1.2; }
    .tl-dot-wrap { flex-shrink: 0; padding-top: 1.1rem; }
    .tl-dot { width: 12px; height: 12px; border-radius: 50%; background: #fff; border: 3px solid var(--ocean); box-shadow: 0 0 0 3px rgba(0,119,182,.12); }

    /* Event card */
    .evt-card { flex: 1; background: #fff; border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; transition: transform .18s, box-shadow .18s; }
    .evt-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
    .evt-head { padding: .85rem 1rem .55rem; display: flex; align-items: flex-start; gap: .65rem; }
    .evt-emoji { font-size: 1.5rem; flex-shrink: 0; line-height: 1; }
    .evt-info { flex: 1; min-width: 0; }
    .evt-title { font-weight: 700; font-size: .98rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .evt-meta  { display: flex; gap: .45rem; align-items: center; margin-top: .22rem; flex-wrap: wrap; }
    .type-badge { font-size: .67rem; font-weight: 700; padding: .1rem .48rem; border-radius: 10px; text-transform: uppercase; }
    .evt-timerange { font-size: .76rem; color: var(--muted); }
    .evt-desc { font-size: .86rem; color: #444; padding: 0 1rem .5rem; line-height: 1.52; }
    .evt-addr { display: flex; align-items: center; gap: .35rem; font-size: .8rem; color: var(--ocean); padding: 0 1rem .55rem; text-decoration: none; word-break: break-all; }
    .evt-addr:hover { text-decoration: underline; }
    .evt-foot { display: flex; gap: .4rem; padding: .45rem 1rem .7rem; border-top: 1px solid var(--border); align-items: center; }
    .evt-by { flex: 1; font-size: .72rem; color: var(--muted); }
    .map-btn { font-size: .73rem; padding: .28rem .65rem; background: #e8f4fd; color: var(--ocean); border: 1px solid #bee3f8; border-radius: 6px; cursor: pointer; font-weight: 600; white-space: nowrap; }
    .map-btn:hover { background: #bee3f8; }
    .map-frame { width: 100%; height: 195px; border: none; border-top: 1px solid var(--border); display: none; }
    .map-frame.open { display: block; }

    /* Add event btn */
    .add-btn { display: flex; align-items: center; gap: .5rem; padding: .75rem 1.1rem; background: #fff; border: 2px dashed var(--border); border-radius: var(--radius); cursor: pointer; color: var(--muted); font-size: .88rem; font-weight: 600; width: 100%; margin-top: .7rem; transition: all .2s; }
    .add-btn:hover { border-color: var(--ocean); color: var(--ocean); background: #f0f8ff; }

    /* ── DRIVING CONNECTOR ── */
    .drive-connector { display: flex; align-items: center; margin: .1rem 0 .1rem 50px; padding: 0 0 0 1.6rem; position: relative; }
    .drive-connector::before { content:''; position:absolute; left:5px; top:0; bottom:0; width:2px; background: linear-gradient(to bottom,var(--ocean),var(--green)); opacity:.35; }
    .drive-pill {
      display: inline-flex; align-items: center; gap: .4rem;
      background: #f0f9ff; border: 1px solid #bae6fd;
      border-radius: 20px; padding: .28rem .85rem;
      font-size: .76rem; color: #0369a1; font-weight: 600;
      cursor: pointer; transition: background .18s;
    }
    .drive-pill:hover { background: #e0f2fe; }
    .drive-pill.loading { color: #94a3b8; border-color: var(--border); background: #f8fafc; cursor: default; animation: pulse 1.2s infinite; }
    .drive-pill.no-data { color: #94a3b8; border-color: var(--border); background: #f8fafc; cursor: default; font-size: .7rem; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.45} }

    /* ── CHECKLIST ── */
    .checklist-section { padding: .3rem 1rem .7rem; border-top: 1px solid var(--border); }
    .checklist-label { font-size: .74rem; font-weight: 700; color: var(--muted); margin-bottom: .45rem; display: flex; align-items: center; justify-content: space-between; }
    .cl-progress { font-size: .7rem; color: var(--ocean); font-weight: 700; }
    .cl-item { display: flex; align-items: center; gap: .5rem; padding: .28rem 0; }
    .cl-cb { width: 15px; height: 15px; accent-color: var(--ocean); cursor: pointer; flex-shrink: 0; }
    .cl-text { font-size: .84rem; color: var(--text); line-height: 1.4; flex: 1; transition: color .2s; }
    .cl-text.done { text-decoration: line-through; color: #94a3b8; }
    /* modal checklist */
    .fcl-wrap { border: 1.5px solid var(--border); border-radius: var(--radius-sm); padding: .55rem .7rem; }
    .fcl-item { display: flex; align-items: center; gap: .4rem; margin-bottom: .35rem; }
    .fcl-item:last-child { margin-bottom: 0; }
    .fcl-inp { flex: 1; padding: .38rem .6rem; border: 1.5px solid var(--border); border-radius: 6px; font-size: .86rem; font-family: inherit; }
    .fcl-inp:focus { outline: none; border-color: var(--ocean); }
    .fcl-del { background: none; border: none; color: #dc2626; font-size: 1.1rem; cursor: pointer; line-height: 1; padding: 0 .15rem; opacity: .6; }
    .fcl-del:hover { opacity: 1; }
    .fcl-add { display: flex; align-items: center; gap: .3rem; background: none; border: none; color: var(--ocean); font-size: .8rem; font-weight: 600; cursor: pointer; padding: .38rem 0 0; }
    .fcl-add:hover { text-decoration: underline; }
    .fcl-add:disabled { color: var(--muted); cursor: not-allowed; text-decoration: none; }

    /* ── CREDENTIALS ── */
    .cred-filters { display: flex; gap: .4rem; flex-wrap: wrap; margin-bottom: 1.1rem; }
    .cf-btn { padding: .38rem .95rem; border-radius: 20px; border: 1.5px solid var(--border); background: #fff; font-size: .8rem; font-weight: 600; cursor: pointer; color: var(--muted); transition: all .18s; }
    .cf-btn.active { background: var(--ocean); color: #fff; border-color: var(--ocean); }
    .cred-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(255px,1fr)); gap: .9rem; }
    .cred-card { background: #fff; border-radius: var(--radius); box-shadow: var(--shadow); padding: 1.1rem; transition: transform .18s, box-shadow .18s; }
    .cred-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
    .cc-head { display: flex; align-items: center; gap: .7rem; margin-bottom: .65rem; }
    .cc-icon { font-size: 1.7rem; }
    .cc-badge { font-size: .67rem; font-weight: 700; padding: .12rem .48rem; border-radius: 8px; }
    .cc-title { font-weight: 700; font-size: .97rem; margin-top: .15rem; }
    .cc-desc { font-size: .83rem; color: var(--muted); margin-bottom: .45rem; }
    .cc-code { font-size: .78rem; background: #f0f9ff; color: var(--ocean); padding: .28rem .65rem; border-radius: 6px; margin-bottom: .45rem; font-family: monospace; }
    .cc-dates { font-size: .76rem; color: var(--muted); margin-bottom: .55rem; }
    .cc-link { display: inline-flex; align-items: center; gap: .3rem; font-size: .8rem; color: var(--ocean); text-decoration: none; font-weight: 600; margin-bottom: .6rem; word-break: break-all; }
    .cc-link:hover { text-decoration: underline; }
    .cc-foot { display: flex; gap: .4rem; border-top: 1px solid var(--border); padding-top: .6rem; }
    .cred-top { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: .5rem; margin-bottom: 1.1rem; }
    .cred-top h2 { font-size: 1.15rem; font-weight: 800; }

    /* Type colours */
    .t-meal        { background: #fef3c7; color: #b45309; }
    .t-attraction  { background: #dbeafe; color: #1d4ed8; }
    .t-activity    { background: #d1fae5; color: #065f46; }
    .t-transport   { background: #f3e8ff; color: #6b21a8; }
    .t-accommodation { background: #ffe4e6; color: #be123c; }
    .c-flight   { background: #dbeafe; color: #1d4ed8; }
    .c-hotel    { background: #fce7f3; color: #9d174d; }
    .c-car      { background: #d1fae5; color: #065f46; }
    .c-activity { background: #fef3c7; color: #b45309; }
    .c-other    { background: #f1f5f9; color: #475569; }

    /* Loading / Toast */
    .loading { text-align: center; padding: 3rem 1rem; color: var(--muted); }
    .spinner { display: inline-block; width: 26px; height: 26px; border: 3px solid var(--border); border-top-color: var(--ocean); border-radius: 50%; animation: spin .7s linear infinite; margin-bottom: .7rem; }
    @keyframes spin { to{transform:rotate(360deg)} }
    #toast { position: fixed; bottom: 1.4rem; right: 1.4rem; background: #1e293b; color: #fff; padding: .7rem 1.1rem; border-radius: 10px; font-size: .86rem; font-weight: 500; box-shadow: var(--shadow-lg); transform: translateY(120%); opacity: 0; transition: all .28s; z-index: 1000; }
    #toast.show { transform: none; opacity: 1; }

    /* Empty state */
    .empty { text-align: center; color: #94a3b8; padding: 2rem 1rem; font-size: .92rem; }

    @media(max-width:600px) {
      .timeline::before { left: 40px; }
      .tl-time { width: 34px; font-size: .66rem; }
      .form-row { grid-template-columns: 1fr; }
      .day-hero { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>

<!-- ══ USERNAME MODAL ══ -->
<div id="name-overlay" class="overlay">
  <div class="modal-box">
    <div class="modal-title">🏝 歡迎來到沖繩旅遊行程</div>
    <p style="color:var(--muted);font-size:.88rem;margin-bottom:1.2rem">請輸入名字，讓同行夥伴知道你在線上</p>
    <div class="form-group">
      <label>你的名字</label>
      <input id="name-inp" type="text" placeholder="例如：小明" maxlength="12"/>
    </div>
    <div class="form-group">
      <label>選擇顏色</label>
      <div class="color-row" id="color-row"></div>
    </div>
    <button class="btn btn-primary btn-full" onclick="confirmName()">開始使用 →</button>
  </div>
</div>

<!-- ══ APP ══ -->
<div id="app" style="display:none">

  <header>
    <div>
      <div class="hdr-title">🏝 2026沖繩週年之旅</div>
      <div class="hdr-sub">5天4夜・吃爆玩爆喝爆🤩🥰😍</div>
    </div>
    <div style="display:flex;align-items:flex-end;flex-direction:column;gap:.35rem">
      <div>
        <div style="color:rgba(255,255,255,.6);font-size:.7rem;margin-bottom:.3rem">目前在線</div>
        <div class="presence-bar" id="presence-bar"><span class="p-label">連線中...</span></div>
      </div>
      <button class="btn btn-ghost btn-sm" id="change-user-btn" onclick="changeUser()" style="font-size:.72rem;padding:.22rem .65rem;opacity:.75">✏️ 變更身份</button>
    </div>
  </header>

  <div class="tabs-wrap"><div class="tabs" id="tabs"></div></div>

  <main id="main">
    <div class="loading"><div class="spinner"></div><br>載入行程中...</div>
  </main>

</div>

<!-- ══ EVENT MODAL ══ -->
<div id="evt-overlay" class="overlay hidden">
  <div class="modal-box">
    <div class="modal-title" id="evt-modal-title">新增行程事件</div>
    <div class="form-row">
      <div class="form-group">
        <label>類型</label>
        <select id="f-type">
          <option value="attraction">🏯 景點</option>
          <option value="meal">🍜 餐廳</option>
          <option value="activity">🤿 活動</option>
          <option value="transport">🚗 交通</option>
          <option value="accommodation">🏨 住宿</option>
        </select>
      </div>
      <div class="form-group">
        <label>Emoji 圖示</label>
        <input id="f-emoji" type="text" placeholder="📍" maxlength="2"/>
      </div>
    </div>
    <div class="form-group">
      <label>名稱 *</label>
      <input id="f-title" type="text" placeholder="例如：首里城公園"/>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>開始時間</label>
        <input id="f-tstart" type="time"/>
      </div>
      <div class="form-group">
        <label>結束時間</label>
        <input id="f-tend" type="time"/>
      </div>
    </div>
    <div class="form-group">
      <label>說明</label>
      <textarea id="f-desc" placeholder="景點 / 餐廳特色說明..."></textarea>
    </div>
    <div class="form-group">
      <label>待辦記事 <span style="color:var(--muted);font-weight:400">（最多 10 筆）</span></label>
      <div class="fcl-wrap">
        <div id="f-cl-list"></div>
        <button type="button" class="fcl-add" id="f-cl-add" onclick="addClItem()">＋ 新增記事</button>
      </div>
    </div>
    <div class="form-group">
      <label>地址</label>
      <input id="f-addr" type="text" placeholder="例如：那霸市首里金城町1-2"/>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>緯度 (Lat)</label>
        <input id="f-lat" type="number" step="0.0001" placeholder="26.2169"/>
      </div>
      <div class="form-group">
        <label>經度 (Lng)</label>
        <input id="f-lng" type="number" step="0.0001" placeholder="127.7192"/>
      </div>
    </div>
    <div class="form-group">
      <label>Google Maps 連結（選填）</label>
      <input id="f-maps" type="url" placeholder="https://maps.app.goo.gl/..."/>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeEvtModal()">取消</button>
      <button class="btn btn-danger btn-sm" id="evt-del-btn" style="display:none" onclick="deleteEvt()">刪除</button>
      <button class="btn btn-primary" onclick="saveEvt()">儲存</button>
    </div>
  </div>
</div>

<!-- ══ CREDENTIAL MODAL ══ -->
<div id="cred-overlay" class="overlay hidden">
  <div class="modal-box">
    <div class="modal-title" id="cred-modal-title">新增憑證</div>
    <div class="form-row">
      <div class="form-group">
        <label>類型</label>
        <select id="c-type">
          <option value="flight">✈️ 機票</option>
          <option value="hotel">🏨 住宿</option>
          <option value="car">🚗 租車</option>
          <option value="activity">🎯 活動</option>
          <option value="other">📄 其他</option>
        </select>
      </div>
      <div class="form-group">
        <label>確認碼 / 訂位代號</label>
        <input id="c-confirm" type="text" placeholder="例如：ABC123"/>
      </div>
    </div>
    <div class="form-group">
      <label>名稱 *</label>
      <input id="c-title" type="text" placeholder="例如：去程機票 台北→那霸"/>
    </div>
    <div class="form-group">
      <label>說明</label>
      <textarea id="c-desc" placeholder="航班資訊、入住條件等..."></textarea>
    </div>
    <div class="form-group">
      <label>連結（電子票 / 訂單頁）</label>
      <input id="c-link" type="url" placeholder="https://..."/>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>有效開始日</label>
        <input id="c-from" type="date"/>
      </div>
      <div class="form-group">
        <label>有效結束日</label>
        <input id="c-until" type="date"/>
      </div>
    </div>

function saveUser(name, color) {
  // localStorage（本機 file:// 及 https:// 皆有效）
  localStorage.setItem('ok_name',  name)
  localStorage.setItem('ok_color', color)
  // cookie 備援（https:// 環境）
  try {
    const exp = new Date(Date.now() + 90*864e5).toUTCString()
    document.cookie = `ok_name=${encodeURIComponent(name)};expires=${exp};path=/;SameSite=Lax`
    document.cookie = `ok_color=${encodeURIComponent(color)};expires=${exp};path=/;SameSite=Lax`
  } catch(_) {}
}
function loadUser(key) {
  // 優先 localStorage
  const ls = localStorage.getItem(key)
  if (ls) return ls
  // fallback cookie
  try {
    const m = document.cookie.match('(?:^|; )'+key+'=([^;]*)')
    return m ? decodeURIComponent(m[1]) : null
  } catch(_) { return null }
}
function clearUser() {
  localStorage.removeItem('ok_name')
  localStorage.removeItem('ok_color')
  try {
    document.cookie = 'ok_name=;expires=Thu, 01 Jan 1970 00:00:00 GMT;path=/'
    document.cookie = 'ok_color=;expires=Thu, 01 Jan 1970 00:00:00 GMT;path=/'
  } catch(_) {}
}

  const { data: dd } = await db.from('days').insert(SEED_DAYS).select()

  const map = {}; dd.forEach(d => map[d.day_number] = d.id)
  const evts = SEED_EVTS.map(({dn,ts,desc,addr,oi,...r}) => ({
    ...r, day_id:map[dn], time_start:ts, description:desc, address:addr,
    order_index:oi, created_by:'System'

  await db.from('events').insert(evts)
  await db.from('credentials').insert(SEED_CREDS)
  toast('✅ 行程資料初始化完成！')
}

async function loadAllEvts() {
  const { data } = await db.from('events').select('*').order('order_index')
  evtMap = {}
  days.forEach(d => evtMap[d.day_number] = [])
  if (data) {
    data.forEach(e => {
      const d = days.find(x => x.id === e.day_id)
      if (d) { evtMap[d.day_number] = evtMap[d.day_number] || []; evtMap[d.day_number].push(e) }
    })
    Object.keys(evtMap).forEach(k => evtMap[k].sort((a,b) => (a.time_start||'').localeCompare(b.time_start||'')))
  }
}

      timelineHtml += evtCard(e, day)
      if (i < evts.length - 1) {
        const next = evts[i + 1]
        timelineHtml += driveConnector(e, next)
      }
    })
  } else {
    timelineHtml = '<div class="empty">還沒有行程，點下方按鈕新增！</div>'
  }

  document.getElementById('main').innerHTML = `
    <div class="day-hero" style="background:linear-gradient(135deg,${day.color},${light})">

    <button class="add-btn" onclick="openAddEvt('${day.id}')">＋ 新增行程事件</button>
  `
  // Fetch driving info for all connectors after render
  evts.forEach((e, i) => {

  })

const TYPE_CN = {meal:'餐廳',attraction:'景點',activity:'活動',transport:'交通',accommodation:'住宿'}

/* ── DRIVING DISTANCE ── */
const driveCache = {}   // key: "lat1,lng1->lat2,lng2"

function driveKey(a, b) { return `${a.lat},${a.lng}->${b.lat},${b.lng}` }

function driveConnector(a, b) {
  if (!a.lat || !a.lng || !b.lat || !b.lng) return ''
  const key = driveKey(a, b)
  const id  = `drive-${key.replace(/[^0-9.]/g,'_')}`
  const cached = driveCache[key]
  let inner
  if (cached === 'err') {
    inner = `<span class="drive-pill no-data">📍 無法取得距離</span>`
  } else if (cached) {
    inner = drivePillHtml(cached, a, b)
  } else {
    inner = `<span class="drive-pill loading" id="${id}">🚗 計算中...</span>`
  }
  return `<div class="drive-connector">${inner}</div>`
}

function drivePillHtml(data, a, b) {
  const dirUrl = `https://www.google.com/maps/dir/${a.lat},${a.lng}/${b.lat},${b.lng}`
  return `<a class="drive-pill" href="${dirUrl}" target="_blank" title="在 Google Maps 開啟導航">
    🚗 ${data.dist} &nbsp;·&nbsp; 🕐 ${data.time}
  </a>`
}

async function fetchDriving(a, b) {
  if (!a.lat || !a.lng || !b.lat || !b.lng) return
  const key = driveKey(a, b)
  if (driveCache[key]) return   // already cached
  driveCache[key] = null        // mark in-flight
  const id = `drive-${key.replace(/[^0-9.]/g,'_')}`

  try {
    const url = `https://router.project-osrm.org/route/v1/driving/${a.lng},${a.lat};${b.lng},${b.lat}?overview=false`
    const res  = await fetch(url)
    const json = await res.json()
    if (json.code !== 'Ok' || !json.routes?.length) throw new Error('no route')

    const meters  = json.routes[0].distance
    const seconds = json.routes[0].duration
    const dist = meters  < 1000 ? `${Math.round(meters)} m` : `${(meters/1000).toFixed(1)} km`
    const time = seconds < 60   ? `${Math.round(seconds)} 秒`
               : seconds < 3600 ? `${Math.round(seconds/60)} 分鐘`
               : `${Math.floor(seconds/3600)} 小時 ${Math.round((seconds%3600)/60)} 分鐘`

    driveCache[key] = { dist, time }
  } catch(_) {
    driveCache[key] = 'err'
  }

  // Update DOM element if it still exists
  const el = document.getElementById(id)
  if (!el) return
  const pill = driveCache[key] === 'err'
    ? `<span class="drive-pill no-data">📍 無法取得距離</span>`
    : drivePillHtml(driveCache[key], a, b)
  el.closest('.drive-connector').innerHTML = pill
}

function evtCard(e, day) {
  const mapsHref = e.google_maps_url || (e.lat&&e.lng ? `https://www.google.com/maps/search/?api=1&query=${e.lat},${e.lng}` : '')
  const embedUrl = e.lat&&e.lng ? `https://maps.google.com/maps?q=${e.lat},${e.lng}&z=15&output=embed&hl=zh-TW` : ''
  const timeStr = e.time_start ? e.time_start.slice(0,5) : '--:--'
  const timeEnd = e.time_end ? '~ '+e.time_end.slice(0,5) : ''
  return `
  <div class="tl-item">
    <div class="tl-time">${timeStr}</div>
    <div class="tl-dot-wrap"><div class="tl-dot" style="border-color:${day.color}"></div></div>
    <div class="evt-card">
      <div class="evt-head">
        <div class="evt-emoji">${e.emoji||'📍'}</div>
        <div class="evt-info">
          <div class="evt-title">${e.title}</div>
          <div class="evt-meta">
            <span class="type-badge t-${e.type}">${TYPE_CN[e.type]||e.type}</span>
            ${timeEnd ? `<span class="evt-timerange">${timeEnd}</span>` : ''}
          </div>
        </div>
      </div>
      ${e.description ? `<div class="evt-desc">${e.description}</div>` : ''}
      ${renderChecklist(e)}
      ${e.address ? `<a class="evt-addr" href="${mapsHref||'#'}" target="${mapsHref?'_blank':'_self'}">📍 ${e.address}</a>` : ''}
      <div class="evt-foot">
        <span class="evt-by">by ${e.created_by||'—'}</span>
        ${embedUrl ? `<button class="map-btn" onclick="toggleMap('${e.id}')">🗺 地圖</button>` : ''}
        <button class="btn btn-ghost btn-sm" onclick="openEditEvt('${e.id}')">編輯</button>
      </div>
      ${embedUrl ? `<iframe id="map-${e.id}" class="map-frame" src="${embedUrl}" allowfullscreen loading="lazy"></iframe>` : ''}
    </div>
  </div>`
}

function toggleMap(id) {
  document.getElementById('map-'+id)?.classList.toggle('open')
}

/* ── CHECKLIST CARD RENDER ── */
function renderChecklist(e) {
  const items = Array.isArray(e.checklist) ? e.checklist : []
  if (!items.length) return ''
  const done = items.filter(i=>i.done).length
  return `
  <div class="checklist-section">
    <div class="checklist-label">
      <span>📋 待辦記事</span>
      <span class="cl-progress">${done}/${items.length}</span>
    </div>
    ${items.map((item,idx) => `
      <div class="cl-item">
        <input type="checkbox" class="cl-cb" ${item.done?'checked':''} onchange="toggleCheck('${e.id}',${idx},this.checked)"/>
        <span class="cl-text ${item.done?'done':''}" id="cl-text-${e.id}-${idx}">${escHtml(item.text)}</span>
      </div>`).join('')}
  </div>`
}

async function toggleCheck(evtId, idx, checked) {
  // Find the event across all days
  let evt = null
  Object.values(evtMap).forEach(arr => { const f=arr.find(x=>x.id===evtId); if(f) evt=f })
  if (!evt) return
  const items = Array.isArray(evt.checklist) ? [...evt.checklist] : []
  if (!items[idx]) return
  items[idx] = { ...items[idx], done: checked }
  // Optimistic UI
  evt.checklist = items
  const textEl = document.getElementById(`cl-text-${evtId}-${idx}`)
  if (textEl) textEl.classList.toggle('done', checked)
  // Update progress label
  const section = textEl?.closest('.checklist-section')
  if (section) {
    const prog = section.querySelector('.cl-progress')
    const done = items.filter(i=>i.done).length
    if (prog) prog.textContent = `${done}/${items.length}`
  }
  await db.from('events').update({ checklist: items, updated_at: new Date().toISOString() }).eq('id', evtId)
}

function buildRoute(evts) {
  const pts = evts.filter(e=>e.lat&&e.lng)
  if (pts.length < 2) return ''
  return 'https://www.google.com/maps/dir/'+pts.map(e=>`${e.lat},${e.lng}`).join('/')
}

function lighten(hex) {
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16)
  return `rgb(${Math.min(r+55,255)},${Math.min(g+55,255)},${Math.min(b+55,255)})`
}

/* ── CREDENTIALS ── */
const CRED_ICON  = {flight:'✈️',hotel:'🏨',car:'🚗',activity:'🎯',other:'📄'}
const CRED_LABEL = {flight:'機票',hotel:'住宿',car:'租車',activity:'活動',other:'其他'}

function renderCredPanel() {
  const shown = credFilter==='all' ? creds : creds.filter(c=>c.type===credFilter)
  document.getElementById('main').innerHTML = `
    <div class="cred-top">
      <h2>🗂 旅行憑證</h2>
      <button class="btn btn-primary btn-sm" onclick="openAddCred()">＋ 新增憑證</button>
    </div>
    <div class="cred-filters">
      ${['all','flight','hotel','car','activity','other'].map(f =>
        `<button class="cf-btn ${credFilter===f?'active':''}" onclick="setCF('${f}')">
          ${f==='all'?'全部':CRED_ICON[f]+' '+CRED_LABEL[f]}

      ${shown.length ? shown.map(credCard).join('') : '<div class="empty" style="grid-column:1/-1">沒有找到憑證</div>'}
    </div>`
}

function credCard(c) {
  const dates = [c.valid_from, c.valid_until&&c.valid_until!==c.valid_from?'→ '+c.valid_until:''].filter(Boolean).join(' ')
  return `
  <div class="cred-card">
    <div class="cc-head">
      <div class="cc-icon">${CRED_ICON[c.type]||'📄'}</div>
      <div>
        <div class="cc-badge c-${c.type}">${CRED_LABEL[c.type]||c.type}</div>
        <div class="cc-title">${c.title}</div>
      </div>
    </div>
    ${c.description ? `<div class="cc-desc">${c.description}</div>` : ''}
    ${c.confirmation_number ? `<div class="cc-code">📋 ${c.confirmation_number}</div>` : ''}
    ${dates ? `<div class="cc-dates">📅 ${dates}</div>` : ''}
    ${c.link_url ? `<a class="cc-link" href="${c.link_url}" target="_blank">🔗 開啟連結 ↗</a>` : ''}
    <div class="cc-foot">
      <button class="btn btn-ghost btn-sm" onclick="openEditCred('${c.id}')">編輯</button>
    </div>
  </div>`
}

function setCF(f) { credFilter=f; renderCredPanel() }

// ════════════════════════════════════════════════════
// CHECKLIST MODAL MANAGEMENT
// ════════════════════════════════════════════════════
function renderClModal(items) {
  const list = document.getElementById('f-cl-list')
  list.innerHTML = items.map((item,i) => `
    <div class="fcl-item" id="fcl-row-${i}">
      <input class="fcl-inp" type="text" placeholder="記事內容..." value="${escHtml(item.text)}" maxlength="60" id="fcl-inp-${i}"/>
      <button type="button" class="fcl-del" onclick="removeClItem(${i})" title="刪除">×</button>
    </div>`).join('')
  document.getElementById('f-cl-add').disabled = items.length >= 10
}

function getClItems() {
  const rows = document.querySelectorAll('#f-cl-list .fcl-item')
  return Array.from(rows).map((row, i) => {
    const inp = document.getElementById(`fcl-inp-${i}`)
    return inp ? { text: inp.value.trim(), done: false } : null
  }).filter(x => x && x.text)
}

function addClItem() {
  const rows = document.querySelectorAll('#f-cl-list .fcl-item')
  if (rows.length >= 10) return
  const i = rows.length
  const div = document.createElement('div')
  div.className = 'fcl-item'; div.id = `fcl-row-${i}`
  div.innerHTML = `<input class="fcl-inp" type="text" placeholder="記事內容..." maxlength="60" id="fcl-inp-${i}"/>
    <button type="button" class="fcl-del" onclick="removeClItem(${i})" title="刪除">×</button>`
  document.getElementById('f-cl-list').appendChild(div)
  document.getElementById(`fcl-inp-${i}`).focus()
  document.getElementById('f-cl-add').disabled = (i+1) >= 10
}

function removeClItem(idx) {
  // Re-collect current values before removing
  const rows = document.querySelectorAll('#f-cl-list .fcl-item')
  const vals = Array.from(rows).map((_, i) => {
    const el = document.getElementById(`fcl-inp-${i}`); return el ? el.value : ''
  })
  vals.splice(idx, 1)
  const items = vals.map(t => ({ text: t, done: false }))
  renderClModal(items)
  // Restore done state lost during re-render is not needed here (modal always resets done to false visually)
}

function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
}

// ════════════════════════════════════════════════════
// EVENT CRUD
// ════════════════════════════════════════════════════
function openAddEvt(dayId) {
  editEvtId=null; editDayId=dayId
  document.getElementById('evt-modal-title').textContent='新增行程事件'
  ;['f-type','f-emoji','f-title','f-tstart','f-tend','f-desc','f-addr','f-lat','f-lng','f-maps'].forEach(id=>{
    const el=document.getElementById(id); if(el.tagName==='SELECT') el.value='attraction'; else el.value=''
  })
  renderClModal([])
  document.getElementById('evt-del-btn').style.display='none'
  document.getElementById('evt-overlay').classList.remove('hidden')
}

function openEditEvt(id) {
  let e=null; Object.values(evtMap).forEach(arr=>{const f=arr.find(x=>x.id===id); if(f) e=f})
  if (!e) return
  editEvtId=id; editDayId=e.day_id
  document.getElementById('evt-modal-title').textContent='編輯行程事件'
  document.getElementById('f-type').value    = e.type||'attraction'
  document.getElementById('f-emoji').value   = e.emoji||''
  document.getElementById('f-title').value   = e.title||''
  document.getElementById('f-tstart').value  = e.time_start?.slice(0,5)||''
  document.getElementById('f-tend').value    = e.time_end?.slice(0,5)||''
  document.getElementById('f-desc').value    = e.description||''
  document.getElementById('f-addr').value    = e.address||''
  document.getElementById('f-lat').value     = e.lat||''
  document.getElementById('f-lng').value     = e.lng||''
  document.getElementById('f-maps').value    = e.google_maps_url||''
  renderClModal(Array.isArray(e.checklist) ? e.checklist : [])
  document.getElementById('evt-del-btn').style.display='inline-flex'
  document.getElementById('evt-overlay').classList.remove('hidden')
}

function closeEvtModal() { document.getElementById('evt-overlay').classList.add('hidden') }

async function saveEvt() {
  const title=document.getElementById('f-title').value.trim()
  if (!title) { document.getElementById('f-title').focus(); return }

  // Merge checklist items — preserve existing done state by matching text
  let existingCl = []
  if (editEvtId) {
    let e=null; Object.values(evtMap).forEach(arr=>{const f=arr.find(x=>x.id===editEvtId); if(f) e=f})
    existingCl = Array.isArray(e?.checklist) ? e.checklist : []
  }
  const clItems = Array.from(document.querySelectorAll('#f-cl-list .fcl-item')).map((_, i) => {
    const inp = document.getElementById(`fcl-inp-${i}`)
    const text = inp ? inp.value.trim() : ''
    if (!text) return null
    const existing = existingCl.find(x=>x.text===text)
    return { text, done: existing ? existing.done : false }
  }).filter(Boolean)

  const payload = {
    type:            document.getElementById('f-type').value,
    emoji:           document.getElementById('f-emoji').value.trim()||'📍',
    title,
    time_start:      document.getElementById('f-tstart').value||null,
    time_end:        document.getElementById('f-tend').value||null,
    description:     document.getElementById('f-desc').value.trim()||null,
    address:         document.getElementById('f-addr').value.trim()||null,
    lat:             parseFloat(document.getElementById('f-lat').value)||null,
    lng:             parseFloat(document.getElementById('f-lng').value)||null,
    google_maps_url: document.getElementById('f-maps').value.trim()||null,
    checklist:       clItems,
    updated_at:      new Date().toISOString(),
  }

  let error
  if (editEvtId) {
    ;({ error } = await db.from('events').update(payload).eq('id', editEvtId))
  } else {
    payload.day_id      = editDayId
    payload.order_index = (evtMap[curDay]||[]).length + 1
    payload.created_by  = userName
    ;({ error } = await db.from('events').insert(payload))
  }

  if (error) {
    // checklist 欄位不存在時，移除後重試
    if (error.code === '42703' || error.message?.includes('checklist')) {
      delete payload.checklist
      let editEvtIdCopy = editEvtId
      if (editEvtIdCopy) {
        ;({ error } = await db.from('events').update(payload).eq('id', editEvtIdCopy))
      } else {
        ;({ error } = await db.from('events').insert(payload))
      }
      if (!error) {
        toast('⚠️ 儲存成功，但請在 Supabase SQL Editor 執行：\nalter table events add column if not exists checklist jsonb default \'[]\'::jsonb;')
      }
    }
    if (error) {
      toast(`❌ 儲存失敗：${error.message}`)
      console.error('saveEvt error:', error)
      return
    }
  }

  closeEvtModal()
}

async function deleteEvt() {
  if (!editEvtId||!confirm('確定要刪除這個行程事件嗎？')) return
  await db.from('events').delete().eq('id',editEvtId)
  closeEvtModal()
}

async function saveCred() {
  const title=document.getElementById('c-title').value.trim()

  const payload = {
    type:                document.getElementById('c-type').value,
    title,
    description:         document.getElementById('c-desc').value.trim()||null,

async function deleteCred() {

  await db.from('credentials').delete().eq('id',editCredId)
  closeCredModal()
}
