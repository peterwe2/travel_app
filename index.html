<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🏝 2026沖繩週年之旅</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    /* ══════════════════════════════════════
       NOTION-STYLE DESIGN SYSTEM
    ══════════════════════════════════════ */
    :root {
      /* Palette */
      --bg:       #ffffff;
      --sb-bg:    #f7f6f3;
      --text:     #37352f;
      --muted:    #9b9a97;
      --faint:    #e9e9e7;
      --hover:    #efefef;
      --accent:   #2383e2;
      --accent-lt:#e8f3fc;
      --red:      #e03e3e;
      --red-lt:   #fbe4e4;
      --border:   #e9e9e7;

      /* Tokens */
      --font: 'Inter','PingFang TC','Microsoft JhengHei',system-ui,sans-serif;
      --r:    4px;
      --r-md: 6px;
      --r-lg: 8px;
      --sb-w: 240px;
      --mob-bar: 52px;
      --tab-bar: 62px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── LAYOUT ── */
    #app { display: flex; min-height: 100vh; }

    /* ── SIDEBAR ── */
    .sidebar {
      width: var(--sb-w);
      flex-shrink: 0;
      background: var(--sb-bg);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0; left: 0; bottom: 0;
      z-index: 200;
      overflow: hidden;
      transition: transform .22s ease;
    }
    .sidebar.collapsed { transform: translateX(calc(-1 * var(--sb-w))); }

    .sb-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 14px 10px;
      border-bottom: 1px solid var(--border);
    }
    .sb-icon { font-size: 1.25rem; flex-shrink: 0; }
    .sb-title { font-weight: 700; font-size: .9rem; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sb-sub   { font-size: .72rem; color: var(--muted); margin-top: 1px; }

    .sb-section {
      padding: 18px 10px 6px;
      font-size: .68rem;
      font-weight: 600;
      letter-spacing: .06em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .sb-nav { flex: 1; overflow-y: auto; padding: 4px 6px; scrollbar-width: none; }
    .sb-nav::-webkit-scrollbar { display: none; }

    .sb-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border-radius: var(--r-md);
      cursor: pointer;
      font-size: .86rem;
      font-weight: 500;
      color: var(--text);
      border: none;
      background: none;
      width: 100%;
      text-align: left;
      transition: background .12s;
      white-space: nowrap;
    }
    .sb-item:hover  { background: var(--hover); }
    .sb-item.active { background: #e3e2df; font-weight: 600; }
    .sb-item .sb-emoji {
      font-size: 1rem; flex-shrink: 0; line-height: 1; width: 20px; text-align: center;
    }
    .sb-item .sb-label { flex: 1; overflow: hidden; text-overflow: ellipsis; }
    .sb-item .sb-day-n {
      font-size: .7rem; color: var(--muted); font-weight: 400;
    }

    .sb-footer {
      border-top: 1px solid var(--border);
      padding: 10px 8px;
    }
    .sb-presence { display: flex; gap: 5px; align-items: center; flex-wrap: wrap; padding: 6px 6px 8px; }
    .p-dot {
      width: 26px; height: 26px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: .68rem; font-weight: 700; color: #fff;
      position: relative; cursor: default; flex-shrink: 0;
    }
    .p-dot::after {
      content:''; position: absolute; bottom: 0; right: 0;
      width: 8px; height: 8px; border-radius: 50%;
      background: #4ade80; border: 1.5px solid var(--sb-bg);
    }
    .p-label { font-size: .75rem; color: var(--muted); }
    .sb-change-btn {
      width: 100%; padding: 6px 10px; border-radius: var(--r-md);
      border: none; background: none; cursor: pointer;
      font-size: .82rem; color: var(--muted); font-family: var(--font);
      text-align: left; transition: background .12s;
    }
    .sb-change-btn:hover { background: var(--hover); color: var(--text); }

    /* ── MOBILE HEADER ── */
    .mob-header {
      display: none;
      position: fixed; top: 0; left: 0; right: 0;
      height: var(--mob-bar);
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      z-index: 150;
      align-items: center;
      padding: 0 14px;
      gap: 10px;
    }
    .mob-menu-btn {
      width: 32px; height: 32px;
      border: none; background: none;
      border-radius: var(--r-md);
      cursor: pointer; font-size: 1rem;
      display: flex; align-items: center; justify-content: center;
      color: var(--muted);
    }
    .mob-menu-btn:hover { background: var(--hover); }
    .mob-hdr-title { font-weight: 600; font-size: .9rem; flex: 1; }
    .mob-presence  { display: flex; gap: 4px; }

    /* ── PAGE FRAME (tabs + content unified box) ── */
    .page-frame {
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      background: var(--bg);
      overflow: hidden;
      margin: 24px 24px 40px;
    }

    /* ── DAY TABS ── */
    .day-tabs {
      display: flex;
      align-items: stretch;
      overflow-x: auto;
      overflow-y: hidden;
      scrollbar-width: none;
      touch-action: pan-x;
      padding: 0;
      gap: 0;
      background: var(--sb-bg);
      border-bottom: 1px solid var(--border);
    }
    .day-tabs::-webkit-scrollbar { display: none; }
    .mob-tab {
      display: flex; flex-direction: column;
      align-items: center; justify-content: flex-start;
      padding: 7px 6px 7px;
      gap: 0;
      border: none;
      border-right: 1px solid var(--border);
      cursor: pointer;
      white-space: nowrap;
      min-width: 56px;
      border-radius: 0;
      background: var(--sb-bg);
      font-family: var(--font);
      transition: background .1s;
      flex-shrink: 0;
    }
    .mob-tab:last-child { border-right: none; }
    .mob-tab:hover  { background: var(--hover); }
    .mob-tab.active { background: var(--bg); }
    /* row 1: m/d */
    .mt-monthday {
      font-size: .65rem; font-weight: 400;
      color: var(--muted); line-height: 1.5;
      font-variant-numeric: tabular-nums;
    }
    /* row 2: big day number */
    .mt-daynum {
      font-size: 1.3rem; font-weight: 400;
      color: var(--text); line-height: 1;
      letter-spacing: -.02em;
      font-family: 'Noto Serif', Times, serif;
      font-variant-numeric: tabular-nums;
    }
    .mob-tab:not(.active) .mt-daynum { color: var(--muted); }
    .mob-tab.today .mt-daynum {
      background: var(--text); color: var(--bg);
      border-radius: 4px; padding: 0 4px;
    }
    /* row 3: weekday */
    .mt-week {
      font-size: .65rem; font-weight: 400;
      color: var(--muted); line-height: 1.5;
    }
    /* row 4: area badge */
    .mt-badge {
      margin-top: 5px; align-self: stretch; text-align: center;
      font-size: .65rem; font-weight: 500;
      padding: 2px 4px; border-radius: 3px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    /* icon-only tab (cred / prep) */
    .mt-icon { font-size: 1.1rem; line-height: 1; margin: auto 0; }

    /* Mobile header tabs (kept for mobile fallback structure) */
    .mob-tabs { display: none; }

    /* Sidebar overlay for mobile */
    .sb-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.3);
      z-index: 190;
    }
    .sb-overlay.open { display: block; }

    /* ── CONTENT AREA ── */
    .content-area {
      flex: 1;
      margin-left: var(--sb-w);
      min-width: 0;
    }
    main {
      padding: 28px 28px 60px;
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
    .panel-anim { animation: fadeUp .22s ease; }

    /* ── DAY HERO ── */
    .day-hero {
      margin-bottom: 28px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }
    .day-hero-top {
      display: flex; align-items: center; justify-content: space-between;
      gap: 10px; flex-wrap: wrap; margin-bottom: 4px;
    }
.day-title-row {
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap; width: 100%;
    }
    .day-icon { font-size: 2rem; line-height: 1; flex-shrink: 0; }
    .day-h1 {
      font-size: 1.7rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.2;
    }
    .day-summary-row {
      display: flex; align-items: baseline; gap: 16px;
      margin-top: 8px; font-size: .86rem;
    }
    .day-summary-label {
      font-size: .72rem; font-weight: 400; color: var(--muted);
      white-space: nowrap; letter-spacing: .03em; text-transform: uppercase;
    }
    .day-summary-text { color: var(--text); line-height: 1.5; }
    .day-hotel-row {
      display: flex; align-items: center; gap: 16px;
      margin-top: 5px; font-size: .82rem; color: var(--muted);
    }
    .day-hotel-icon { font-size: .85rem; }
    .day-hotel-text { color: var(--text); font-size: .82rem; }
    .day-actions {
      display: flex; gap: 6px; align-items: center; flex-wrap: wrap;
      margin-top: 12px;
    }

    /* ── BUTTONS ── */
    .btn {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 6px 12px; border-radius: var(--r-md);
      border: 1px solid var(--border);
      font-family: var(--font); font-size: .82rem; font-weight: 500;
      cursor: pointer; transition: background .12s;
      background: var(--bg); color: var(--text);
      white-space: nowrap;
    }
    .btn:hover { background: var(--hover); }
    .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    .btn-primary:hover { background: #1a73d4; border-color: #1a73d4; }
    .btn-danger  { background: var(--red-lt); color: var(--red); border-color: #f5c6c6; }
    .btn-danger:hover  { background: #f9d4d4; }
    .btn-sm { padding: 4px 9px; font-size: .76rem; }
    .btn-ghost { background: transparent; color: var(--muted); border-color: var(--border); }
    .btn-ghost:hover { background: var(--hover); color: var(--text); }
    .btn-full { width: 100%; justify-content: center; margin-top: 6px; }
    .btn-route { font-size: .78rem; background: #eff6ff; color: #3b82f6; border-color: #dbeafe; }
    .btn-route:hover { background: #dbeafe; border-color: #bfdbfe; }

    /* ── TIMELINE ── */
    /* line left = tl-time(46px) + gap(4px) + half dot-col(9px) = 59px */
    :root { --tl-time-w: 46px; --tl-dot-w: 18px; --tl-gap: 4px; --tl-line: 59px; }
    .timeline { position: relative; padding-top: 4px; }
    .timeline::before {
      content:''; position:absolute;
      left: var(--tl-line); top: 0; bottom: 0;
      width: 1px; background: var(--border);
    }
    .tl-item { display: flex; gap: var(--tl-gap); margin-bottom: 8px; align-items: flex-start; }
    /* Left time column */
    .tl-time {
      width: var(--tl-time-w); flex-shrink: 0;
      text-align: right;
      font-size: .66rem; font-weight: 500; color: var(--muted);
      font-variant-numeric: tabular-nums; line-height: 1.25;
      padding-top: 9px; letter-spacing: -.01em;
    }
    .tl-time-end { display: block; font-size: .6rem; color: #bbb; margin-top: 1px; }
    /* Dot column */
    .tl-dot-col {
      width: var(--tl-dot-w); flex-shrink: 0;
      display: flex; flex-direction: column; align-items: center;
      padding-top: 6px;
    }
    /* Numbered circle */
    .tl-dot-num {
      width: 17px; height: 17px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: .58rem; font-weight: 700; color: #fff;
      flex-shrink: 0; z-index: 1; font-family: var(--font);
    }
    /* Plain dot */
    .tl-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--bg); border: 2px solid #bbb;
      flex-shrink: 0; z-index: 1; margin-top: 4px;
    }

    /* Event block */
    .evt-card {
      flex: 1;
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      overflow: hidden;
      transition: box-shadow .15s, border-color .15s;
      background: var(--bg);
    }
    .evt-card:hover { border-color: #d0cfcc; box-shadow: 0 2px 8px rgba(0,0,0,.05); }
    /* time + title row */
    .evt-head { padding: 10px 13px 7px; display: flex; align-items: flex-start; gap: 10px; }
    .evt-emoji { font-size: 1.2rem; flex-shrink: 0; line-height: 1.4; }
    .evt-info { flex: 1; min-width: 0; }
    .evt-title-row { display: flex; align-items: flex-start; gap: 8px; }
    .evt-title-col { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
    .evt-title { font-weight: 600; font-size: .93rem; line-height: 1.35; }
    .evt-meta  { display: flex; gap: 6px; align-items: center; margin-top: 3px; flex-wrap: wrap; }
    .type-badge {
      font-size: .65rem; font-weight: 600;
      padding: 2px 7px; border-radius: 3px;
      letter-spacing: .02em;
    }
    .evt-desc { font-size: .84rem; color: #5c5c5a; padding: 0 13px 8px; line-height: 1.6; }
    .evt-addr {
      display: flex; align-items: center; gap: 5px;
      font-size: .78rem; color: var(--accent);
      padding: 0 13px 9px; text-decoration: none;
      word-break: break-all;
    }
    .evt-addr:hover { text-decoration: underline; }
    .evt-foot {
      display: flex; gap: 6px; padding: 6px 13px 9px;
      border-top: 1px solid var(--faint);
      align-items: center;
    }
    .evt-foot-left { display: flex; gap: 5px; flex: 1; flex-wrap: wrap; }
    .evt-panel {
      border-top: 1px solid var(--faint);
      padding: 10px 13px; display: none;
    }
    .evt-panel.open { display: block; }
    .map-btn {
      display: inline-flex; align-items: center;
      font-size: .76rem; padding: 4px 9px;
      background: transparent; color: var(--muted);
      border: 1px solid var(--border);
      border-radius: var(--r-md); cursor: pointer;
      font-weight: 500; white-space: nowrap;
      font-family: var(--font);
      transition: background .12s, color .12s;
    }
    .map-btn:hover { background: var(--hover); color: var(--text); }
    .map-frame { width: 100%; height: 185px; border: none; display: block; }

    /* Add event */
    .add-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 9px 13px;
      background: none;
      border: 1.5px dashed var(--border);
      border-radius: var(--r-lg);
      cursor: pointer; color: var(--muted);
      font-size: .84rem; font-weight: 500;
      font-family: var(--font);
      width: 100%; margin-top: 10px;
      transition: all .12s;
    }
    .add-btn:hover { border-color: #c4c3bf; color: var(--text); background: var(--sb-bg); }

    /* ── DRIVING CONNECTOR ── */
    /* Same flex structure as tl-item so columns align perfectly */
    .drive-connector {
      display: flex; gap: 6px;
      margin-bottom: 0;
      align-items: stretch;
    }
    /* Spacer matching tl-time width */
    .drive-c-spacer { width: var(--tl-time-w); flex-shrink: 0; }
    /* Dot column spacer: line runs behind via timeline::before */
    .drive-c-dot-col { width: var(--tl-dot-w); flex-shrink: 0; }
    /* Pill area */
    .drive-c-body {
      flex: 1;
      display: flex; align-items: center;
      padding: 6px 0;
    }
    .drive-pill {
      display: inline-flex; align-items: center; gap: 5px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 6px; padding: 4px 12px;
      font-size: .72rem; color: var(--muted); font-weight: 500;
      cursor: pointer; transition: all .12s; text-decoration: none;
      white-space: nowrap;
    }
    .drive-pill:hover { background: var(--hover); color: var(--text); border-color: #c4c3bf; }
    .drive-pill.loading { animation: pulse 1.2s infinite; cursor: default; }
    .drive-pill.no-data { cursor: default; font-size: .68rem; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    .drive-mode-tabs { display: flex; gap: 3px; margin-left: 6px; }
    .dm-btn {
      background: none; border: 1px solid var(--border); border-radius: var(--r);
      padding: 2px 7px; font-size: .8rem; cursor: pointer; line-height: 1.4;
      color: var(--muted); transition: all .12s; font-family: var(--font);
    }
    .dm-btn:hover { background: var(--hover); color: var(--text); }
    .dm-btn.active { background: var(--faint); border-color: #c4c3bf; color: var(--text); }

    /* ── BUDGET ── */
    .budget-summary {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 18px;
    }
    .budget-stat {
      border: 1px solid var(--border); border-radius: var(--r-lg);
      padding: 12px 14px; background: var(--bg);
    }
    .budget-stat-label { font-size: .68rem; color: var(--muted); font-weight: 600; letter-spacing: .04em; margin-bottom: 4px; }
    .budget-stat-val { font-size: 1.15rem; font-weight: 700; font-variant-numeric: tabular-nums; }
    .budget-filters { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 14px; }
    .expense-list { display: flex; flex-direction: column; gap: 7px; }
    .expense-item {
      display: flex; align-items: center; gap: 10px;
      border: 1px solid var(--border); border-radius: var(--r-lg);
      padding: 10px 13px; background: var(--bg);
      transition: border-color .12s;
    }
    .expense-item:hover { border-color: #d0cfcc; }
    .expense-cat-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    }
    .expense-info { flex: 1; min-width: 0; }
    .expense-title { font-size: .88rem; font-weight: 600; }
    .expense-meta { font-size: .72rem; color: var(--muted); margin-top: 2px; }
    .expense-amount { font-size: .95rem; font-weight: 700; font-variant-numeric: tabular-nums; white-space: nowrap; }
    .expense-actions { display: flex; gap: 4px; }
    .budget-cat-bar { margin-bottom: 18px; }
    .cat-bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .cat-bar-label { width: 68px; font-size: .72rem; color: var(--muted); flex-shrink: 0; }
    .cat-bar-track { flex: 1; height: 6px; background: var(--faint); border-radius: 99px; overflow: hidden; }
    .cat-bar-fill { height: 100%; border-radius: 99px; transition: width .3s; }
    .cat-bar-amt { font-size: .72rem; font-variant-numeric: tabular-nums; color: var(--muted); white-space: nowrap; }

    /* ── CHECKLIST ── */
    .checklist-section { padding: 4px 13px 10px; border-top: 1px solid var(--faint); }
    .checklist-label {
      font-size: .7rem; font-weight: 600; color: var(--muted);
      margin-bottom: 5px; display: flex; align-items: center;
      justify-content: space-between;
    }
    .cl-progress { color: var(--accent); }
    .cl-item { display: flex; align-items: center; gap: 7px; padding: 3px 0; }
    .cl-cb { width: 14px; height: 14px; accent-color: var(--accent); cursor: pointer; flex-shrink: 0; border-radius: 3px; }
    .cl-text { font-size: .83rem; color: var(--text); flex: 1; transition: color .15s; }
    .cl-text.done { text-decoration: line-through; color: var(--muted); }
    /* modal checklist */
    .fcl-wrap { border: 1px solid var(--border); border-radius: var(--r-md); padding: 8px 10px; background: var(--sb-bg); }
    .fcl-item { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
    .fcl-item:last-child { margin-bottom: 0; }
    .fcl-inp { flex: 1; padding: 5px 8px; border: 1px solid var(--border); border-radius: var(--r-md); font-size: .84rem; font-family: var(--font); background: var(--bg); }
    .fcl-inp:focus { outline: none; border-color: var(--accent); }
    .fcl-del { background: none; border: none; color: var(--muted); font-size: 1rem; cursor: pointer; padding: 0 2px; }
    .fcl-del:hover { color: var(--red); }
    .fcl-add { background: none; border: none; color: var(--accent); font-size: .79rem; font-weight: 500; cursor: pointer; padding: 5px 0 0; font-family: var(--font); }
    .fcl-add:hover { text-decoration: underline; }
    .fcl-add:disabled { color: var(--muted); cursor: not-allowed; text-decoration: none; }

    /* ── CRED PICKER (in evt modal) ── */
    .cred-picker { display: flex; flex-wrap: wrap; gap: 6px; min-height: 32px; }
    .cred-picker:empty::after { content: '尚無憑證可連結'; font-size: .76rem; color: var(--muted); }
    .cp-item {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 10px; border-radius: 99px;
      border: 1px solid var(--border); cursor: pointer;
      font-size: .76rem; font-family: var(--font); font-weight: 500;
      background: var(--bg); color: var(--muted);
      transition: all .12s; white-space: nowrap;
    }
    .cp-item.selected { background: var(--accent-lt); border-color: var(--accent); color: var(--accent); }
    .cp-item:hover:not(.selected) { background: var(--hover); color: var(--text); }
    /* link items in modal */
    .flink-item { display: flex; align-items: center; gap: 5px; margin-bottom: 5px; }
    .flink-item:last-child { margin-bottom: 0; }
    .flink-name { flex: 1; min-width: 0; }
    .flink-url  { flex: 2; min-width: 0; }
    .flink-inp  { width: 100%; padding: 5px 8px; border: 1px solid var(--border); border-radius: var(--r); font-family: var(--font); font-size: .8rem; background: var(--bg); color: var(--text); }
    .flink-inp:focus { outline: none; border-color: var(--accent); }
    .flink-del  { background: none; border: none; color: var(--muted); font-size: 1rem; cursor: pointer; padding: 0 2px; flex-shrink: 0; }
    .flink-del:hover { color: var(--red); }
    /* links in evt card */
    .evt-links { display: flex; flex-direction: column; gap: 3px; margin-top: 6px; }
    .evt-link-item {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: .76rem; color: var(--accent); text-decoration: none;
      padding: 2px 0; width: fit-content;
    }
    .evt-link-item:hover { text-decoration: underline; }
    .evt-link-item::before { content: '↗'; font-size: .7rem; opacity: .7; }

    /* linked cred pills in evt card */
    .evt-creds { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 6px; }
    .evt-cred-pill {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 9px; border-radius: 99px;
      border: 1px solid var(--border);
      font-size: .7rem; font-weight: 500; color: var(--muted);
      background: var(--sb-bg); cursor: pointer; white-space: nowrap;
      transition: background .12s, color .12s;
    }
    .evt-cred-pill:hover { background: var(--hover); color: var(--text); }

    /* ── PREP PANEL ── */
    .prep-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      align-items: start;
    }
    @media (max-width: 600px) {
      .prep-grid { grid-template-columns: 1fr; }
    }
    .prep-section { margin-bottom: 0; }
    .prep-section-head {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px;
    }
    .prep-section-title {
      font-size: 1rem; font-weight: 700; display: flex; align-items: center; gap: 6px;
    }
    .prep-progress {
      font-size: .75rem; color: var(--muted); font-weight: 400;
    }
    .prep-list { display: flex; flex-direction: column; gap: 4px; }
    .prep-item {
      display: flex; align-items: center; gap: 9px;
      padding: 7px 10px; border-radius: var(--r-md);
      border: 1px solid var(--border); background: var(--bg);
      transition: background .1s;
    }
    .prep-item:hover { background: var(--sb-bg); }
    .prep-item input[type=checkbox] {
      width: 15px; height: 15px; flex-shrink: 0; cursor: pointer;
      accent-color: var(--accent);
    }
    .prep-item-text {
      flex: 1; font-size: .86rem; color: var(--text); cursor: pointer;
      outline: none; border: none; background: transparent;
      font-family: var(--font); padding: 0;
    }
    .prep-item-text.done { text-decoration: line-through; color: var(--muted); }
    .prep-item-del {
      background: none; border: none; color: var(--muted);
      cursor: pointer; font-size: 1rem; padding: 0 2px; flex-shrink: 0; opacity: 0;
      transition: opacity .12s;
    }
    .prep-item:hover .prep-item-del { opacity: 1; }
    .prep-item-del:hover { color: var(--red); }
    .prep-add-row {
      display: flex; gap: 8px; margin-top: 8px;
    }
    .prep-add-inp {
      flex: 1; padding: 7px 10px; border: 1px solid var(--border);
      border-radius: var(--r-md); font-family: var(--font);
      font-size: .86rem; background: var(--bg); color: var(--text);
    }
    .prep-add-inp:focus { outline: none; border-color: var(--accent); }
    .prep-bar { height: 4px; border-radius: 2px; background: var(--faint); margin-bottom: 12px; overflow: hidden; }
    .prep-bar-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width .3s; }

    /* ── CREDENTIALS ── */
    .cred-filters { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 16px; }
    .cf-btn {
      padding: 4px 12px; border-radius: 20px;
      border: 1px solid var(--border); background: var(--bg);
      font-size: .78rem; font-weight: 500; cursor: pointer;
      color: var(--muted); font-family: var(--font); transition: all .12s;
    }
    .cf-btn:hover { background: var(--hover); color: var(--text); }
    .cf-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }
    .cred-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(240px,1fr)); gap: 10px; }
    .cred-card {
      border: 1px solid var(--border); border-radius: var(--r-lg);
      padding: 14px; transition: border-color .12s, box-shadow .12s;
    }
    .cred-card:hover { border-color: #c4c3bf; box-shadow: 0 1px 6px rgba(0,0,0,.06); }
    .cc-head { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 9px; }
    .cc-icon { font-size: 1.5rem; flex-shrink: 0; line-height: 1.2; }
    .cc-badge { font-size: .65rem; font-weight: 600; padding: 2px 7px; border-radius: 3px; }
    .cc-title { font-weight: 600; font-size: .9rem; margin-top: 3px; line-height: 1.3; }
    .cc-desc  { font-size: .81rem; color: var(--muted); margin-bottom: 6px; line-height: 1.5; }
    .cc-code  { font-size: .76rem; background: var(--sb-bg); color: var(--text); padding: 3px 8px; border-radius: var(--r-md); margin-bottom: 6px; font-family: monospace; display: inline-block; }
    .cc-dates { font-size: .74rem; color: var(--muted); margin-bottom: 7px; }
    .cc-link  { display: inline-flex; align-items: center; gap: 4px; font-size: .78rem; color: var(--accent); text-decoration: none; font-weight: 500; margin-bottom: 8px; word-break: break-all; }
    .cc-link:hover { text-decoration: underline; }
    .cc-foot  { display: flex; gap: 5px; border-top: 1px solid var(--faint); padding-top: 8px; }
    /* cred image */
    .cc-img { width:100%; height:160px; object-fit:cover; border-radius:var(--r-md); margin-bottom:9px; cursor:pointer; display:block; }
    /* upload zone */
    .upload-zone {
      border: 1.5px dashed var(--border); border-radius: var(--r-md);
      padding: 18px; text-align: center; cursor: pointer;
      color: var(--muted); font-size: .82rem; transition: all .12s;
      position: relative;
    }
    .upload-zone:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-lt); }
    .upload-zone input[type=file] { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
    .upload-preview { width:100%; height:140px; object-fit:cover; border-radius:var(--r-md); display:block; margin-bottom:6px; }
    .upload-clear { font-size:.75rem; color:var(--red); cursor:pointer; background:none; border:none; font-family:var(--font); }
    .upload-clear:hover { text-decoration:underline; }
    .upload-spinner { display:inline-block; width:16px; height:16px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite; vertical-align:middle; margin-right:5px; }
    .cred-top { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
    .cred-top h2 { font-size: 1.1rem; font-weight: 700; }
    .page-title { font-size: 1.6rem; font-weight: 700; margin-bottom: 20px; }

    /* Type badges */
    .t-meal        { background: #fef3c7; color: #92400e; }
    .t-attraction  { background: #dbeafe; color: #1e40af; }
    .t-activity    { background: #d1fae5; color: #065f46; }
    .t-transport   { background: #f3e8ff; color: #5b21b6; }
    .t-accommodation { background: #ffe4e6; color: #9f1239; }
    .c-flight   { background: #dbeafe; color: #1e40af; }
    .c-hotel    { background: #fce7f3; color: #9d174d; }
    .c-car      { background: #d1fae5; color: #065f46; }
    .c-activity { background: #fef3c7; color: #92400e; }
    .c-other    { background: var(--sb-bg); color: #57534e; }
    .c-ticket   { background: #fef9c3; color: #854d0e; }
    .c-booking  { background: #ede9fe; color: #5b21b6; }

    /* ── MODAL ── */
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.35); display: flex; align-items: center; justify-content: center; z-index: 900; padding: 16px; }
    .overlay.hidden { display: none; }
    .modal-box {
      background: var(--bg);
      border-radius: var(--r-lg);
      border: 1px solid var(--border);
      padding: 24px;
      width: min(500px, 100%);
      max-height: 92vh;
      overflow-y: auto;
      box-shadow: 0 8px 40px rgba(0,0,0,.16);
      animation: popIn .18s ease;
    }
    @keyframes popIn { from{transform:scale(.96);opacity:0} to{transform:scale(1);opacity:1} }
    .modal-title { font-size: 1rem; font-weight: 700; margin-bottom: 16px; }
    .modal-footer { display: flex; gap: 6px; justify-content: flex-end; margin-top: 14px; border-top: 1px solid var(--border); padding-top: 12px; }

    /* ── FORM ── */
    .form-group { margin-bottom: 12px; }
    .form-group label { display: block; font-size: .75rem; font-weight: 600; color: var(--muted); margin-bottom: 4px; letter-spacing: .02em; }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; padding: 7px 10px;
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      font-size: .86rem; font-family: var(--font);
      background: var(--bg); color: var(--text);
      transition: border-color .12s;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      outline: none; border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent-lt);
    }
    .form-group textarea { resize: vertical; min-height: 72px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    /* ── COLOR PICKER ── */
    .color-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
    .swatch { width: 24px; height: 24px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; transition: transform .12s; }
    .swatch.sel { border-color: var(--text); transform: scale(1.15); }

    /* ── LOADING / TOAST ── */
    .loading { text-align: center; padding: 48px 16px; color: var(--muted); }
    .spinner { display: inline-block; width: 22px; height: 22px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; margin-bottom: 10px; }
    @keyframes spin { to{transform:rotate(360deg)} }
    #toast {
      position: fixed; bottom: 20px; right: 20px;
      background: #37352f; color: #fff;
      padding: 9px 14px; border-radius: var(--r-md);
      font-size: .82rem; font-weight: 500;
      box-shadow: 0 4px 20px rgba(0,0,0,.2);
      transform: translateY(120%); opacity: 0;
      transition: all .24s; z-index: 1000;
      max-width: 300px;
    }
    #toast.show { transform: none; opacity: 1; }

    /* Empty state */
    .empty { text-align: center; color: var(--muted); padding: 36px 16px; font-size: .86rem; }

    /* ── WELCOME MODAL ── */
    .welcome-box {
      background: var(--bg); border-radius: var(--r-lg);
      border: 1px solid var(--border);
      padding: 32px 28px;
      width: min(380px, 100%);
      box-shadow: 0 8px 40px rgba(0,0,0,.14);
      animation: popIn .2s ease;
    }
    .welcome-icon { font-size: 2.5rem; margin-bottom: 12px; }
    .welcome-title { font-size: 1.25rem; font-weight: 700; margin-bottom: 6px; }
    .welcome-sub   { font-size: .85rem; color: var(--muted); margin-bottom: 20px; }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      .sidebar { transform: translateX(calc(-1 * var(--sb-w))); }
      .sidebar.open { transform: none; }
      .content-area { margin-left: 0; }
      .mob-header { display: flex; }
      .page-frame { margin: calc(var(--mob-bar) + 12px) 6px 32px; border-radius: var(--r-md); }
      main { padding: 16px 10px 48px; }
      .form-row { grid-template-columns: 1fr; }
    }
    @media (min-width: 769px) {
      .sb-overlay { display: none !important; }
    }
    @media (max-width: 480px) {
      .day-h1 { font-size: 1.35rem; }
    }
    @media (max-width: 768px) {
      /* Timeline: even tighter on mobile to maximise card width */
      :root { --tl-time-w: 40px; --tl-dot-w: 16px; --tl-gap: 3px; --tl-line: 52px; }
      .evt-head { padding: 8px 10px 6px; }
      .evt-desc { padding: 0 10px 7px; }
      .evt-addr { padding: 0 10px 8px; }
      .evt-foot { padding: 5px 10px 8px; }
      .evt-panel { padding: 8px 10px; }
      .checklist-section { padding: 4px 10px 9px; }
    }
  </style>
</head>
<body>

<!-- ══ USERNAME MODAL ══ -->
<div id="name-overlay" class="overlay">
  <div class="welcome-box">
    <div class="welcome-icon">🏝</div>
    <div class="welcome-title">歡迎來到沖繩旅遊行程</div>
    <div class="welcome-sub">輸入名字讓同行夥伴知道你在線上</div>
    <div class="form-group">
      <label>你的名字</label>
      <input id="name-inp" type="text" placeholder="例如：小明" maxlength="12"/>
    </div>
    <div class="form-group">
      <label>選擇代表色</label>
      <div class="color-row" id="color-row"></div>
    </div>
    <button class="btn btn-primary btn-full" onclick="confirmName()">開始使用 →</button>
  </div>
</div>

<!-- ══ APP ══ -->
<div id="app" style="display:none">

  <!-- Sidebar (desktop) -->
  <aside class="sidebar" id="sidebar">
    <div class="sb-brand">
      <span class="sb-icon">🏝</span>
      <div>
        <div class="sb-title">2026 日本沖繩</div>
        <div class="sb-sub">5天4夜・週年之旅</div>
      </div>
    </div>
    <div class="sb-section">行程</div>
    <nav class="sb-nav" id="sb-nav"></nav>
    <div class="sb-footer">
      <div class="sb-section" style="padding-top:0;margin-bottom:4px">夥伴在線</div>
      <div class="sb-presence" id="presence-bar"><span class="p-label">連線中...</span></div>
      <button class="sb-change-btn" onclick="changeUser()">✏️ 變更身份</button>
    </div>
  </aside>

  <!-- Mobile overlay -->
  <div class="sb-overlay" id="sb-overlay" onclick="closeMobMenu()"></div>

  <!-- Mobile header -->
  <div class="mob-header">
    <button class="mob-menu-btn" onclick="openMobMenu()">☰</button>
    <span class="mob-hdr-title">✈️ 2026沖繩週年之旅</span>
    <div class="mob-presence" id="presence-bar-mob"></div>
  </div>

  <!-- Content -->
  <div class="content-area">
    <div class="page-frame">
      <nav class="day-tabs" id="mob-tabs-inner"></nav>
      <main id="main">
        <div class="loading"><div class="spinner"></div><br>載入行程中...</div>
      </main>
      <div style="text-align:center;padding:14px 0 20px;font-size:.72rem;color:var(--muted);letter-spacing:.06em;border-top:1px solid var(--border)">
        2026．Designed by Peter
      </div>
    </div>
  </div>

</div>

<!-- ══ EXPENSE MODAL ══ -->
<div id="exp-overlay" class="overlay hidden">
  <div class="modal-box">
    <div class="modal-header">
      <span id="exp-modal-title" class="modal-title">新增支出</span>
      <button class="btn btn-ghost btn-sm" onclick="closeExpModal()">✕</button>
    </div>
    <!-- Receipt camera -->
    <div style="margin-bottom:14px">
      <input type="file" id="receipt-input" accept="image/*" capture="environment" style="display:none" onchange="onReceiptPicked(this)"/>
      <button type="button" class="btn btn-ghost btn-sm" style="width:100%;justify-content:center;gap:6px;border-style:dashed" onclick="document.getElementById('receipt-input').click()">
        📷 拍攝收據自動填入
      </button>
      <div id="receipt-status" style="font-size:.72rem;color:var(--muted);margin-top:4px;min-height:1em;text-align:center"></div>
    </div>
    <div class="form-group">
      <label>名稱 *</label>
      <input id="ef-title" type="text" placeholder="例如：晚餐・首里城門票"/>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>金額 *</label>
        <input id="ef-amount" type="number" min="0" step="1" placeholder="1200"/>
      </div>
      <div class="form-group">
        <label>幣別</label>
        <select id="ef-currency">
          <option value="JPY">JPY 日圓</option>
          <option value="TWD">TWD 台幣</option>
          <option value="USD">USD 美元</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>類別</label>
        <select id="ef-category">
          <option value="food">餐飲</option>
          <option value="transport">交通</option>
          <option value="hotel">住宿</option>
          <option value="shopping">購物</option>
          <option value="ticket">票券</option>
          <option value="other">其他</option>
        </select>
      </div>
      <div class="form-group">
        <label>日期</label>
        <select id="ef-day"></select>
      </div>
    </div>
    <div class="form-group">
      <label>備註</label>
      <input id="ef-note" type="text" placeholder="選填"/>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeExpModal()">取消</button>
      <button class="btn btn-danger btn-sm" id="ef-del-btn" style="display:none" onclick="deleteExp()">刪除</button>
      <button class="btn btn-primary" onclick="saveExp()">儲存</button>
    </div>
  </div>
</div>

<!-- ══ EVENT MODAL ══ -->
<div id="evt-overlay" class="overlay hidden">
  <div class="modal-box">
    <div class="modal-title" id="evt-modal-title">新增行程事件</div>
    <div class="form-row">
      <div class="form-group">
        <label>類型</label>
        <select id="f-type">
          <option value="attraction">🏯 景點</option>
          <option value="meal">🍜 餐廳</option>
          <option value="activity">🤿 活動</option>
          <option value="transport">🚗 交通</option>
          <option value="accommodation">🏨 住宿</option>
        </select>
      </div>
      <div class="form-group">
        <label>Emoji 圖示</label>
        <input id="f-emoji" type="text" placeholder="📍" maxlength="2"/>
      </div>
    </div>
    <div class="form-group">
      <label>日期</label>
      <select id="f-day-id" style="width:100%"></select>
    </div>
    <div class="form-group">
      <label>名稱 *</label>
      <input id="f-title" type="text" placeholder="例如：首里城公園"/>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>開始時間</label>
        <input id="f-tstart" type="time"/>
      </div>
      <div class="form-group">
        <label>結束時間</label>
        <input id="f-tend" type="time"/>
      </div>
    </div>
    <div class="form-group">
      <label>說明</label>
      <textarea id="f-desc" placeholder="景點 / 餐廳特色說明..."></textarea>
    </div>
    <div class="form-group">
      <label>超連結 <span style="color:var(--muted);font-weight:400">（最多 5 筆）</span></label>
      <div class="fcl-wrap">
        <div id="f-link-list"></div>
        <button type="button" class="fcl-add" id="f-link-add" onclick="addLinkItem()">＋ 新增連結</button>
      </div>
    </div>
    <div class="form-group">
      <label>待辦記事 <span style="color:var(--muted);font-weight:400">（最多 10 筆）</span></label>
      <div class="fcl-wrap">
        <div id="f-cl-list"></div>
        <button type="button" class="fcl-add" id="f-cl-add" onclick="addClItem()">＋ 新增記事</button>
      </div>
    </div>
    <div class="form-group">
      <label>地址</label>
      <input id="f-addr" type="text" placeholder="例如：那霸市首里金城町1-2"/>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>緯度 (Lat)</label>
        <input id="f-lat" type="number" step="0.0001" placeholder="26.2169"/>
      </div>
      <div class="form-group">
        <label>經度 (Lng)</label>
        <input id="f-lng" type="number" step="0.0001" placeholder="127.7192"/>
      </div>
    </div>
    <div class="form-group">
      <label>Google Maps 短網址 <span style="color:var(--muted);font-weight:400">（顯示於地址超連結）</span></label>
      <input id="f-maps-short" type="url" placeholder="https://maps.app.goo.gl/..."/>
    </div>
    <div class="form-group">
      <label>完整 Maps 網址 <span style="color:var(--muted);font-weight:400">（含經緯度，用來自動填入座標）</span></label>
      <div style="display:flex;gap:6px;align-items:center">
        <input id="f-maps-full" type="url" placeholder="從 Mapu 取得的完整網址..." style="flex:1"

function saveUser(name, color) {
  // localStorage（本機 file:// 及 https:// 皆有效）
  localStorage.setItem('ok_name',  name)
  localStorage.setItem('ok_color', color)
  // cookie 備援（https:// 環境）
  try {
    const exp = new Date(Date.now() + 90*864e5).toUTCString()
    document.cookie = `ok_name=${encodeURIComponent(name)};expires=${exp};path=/;SameSite=Lax`
    document.cookie = `ok_color=${encodeURIComponent(color)};expires=${exp};path=/;SameSite=Lax`
  } catch(_) {}
}
function loadUser(key) {
  // 優先 localStorage
  const ls = localStorage.getItem(key)
  if (ls) return ls
  // fallback cookie
  try {
    const m = document.cookie.match('(?:^|; )'+key+'=([^;]*)')
    return m ? decodeURIComponent(m[1]) : null
  } catch(_) { return null }
}
function clearUser() {
  localStorage.removeItem('ok_name')
  localStorage.removeItem('ok_color')
  try {
    document.cookie = 'ok_name=;expires=Thu, 01 Jan 1970 00:00:00 GMT;path=/'
    document.cookie = 'ok_color=;expires=Thu, 01 Jan 1970 00:00:00 GMT;path=/'
  } catch(_) {}
}

async function loadDays() {
  const { data } = await db.from('days').select('*').order('day_number')
  if (!data || data.length === 0) { await seed(); return loadDays() }
  days = data
}

async function seed() {
  const { data: dd } = await db.from('days').insert(SEED_DAYS).select()
  if (!dd) return
  const map = {}; dd.forEach(d => map[d.day_number] = d.id)
  const evts = SEED_EVTS.map(({dn,ts,desc,addr,oi,...r}) => ({
    ...r, day_id:map[dn], time_start:ts, description:desc, address:addr,
    order_index:oi, created_by:'System'
  }))
  await db.from('events').insert(evts)
  await db.from('credentials').insert(SEED_CREDS)
  toast('✅ 行程資料初始化完成！')
}

async function loadAllEvts() {
  const { data } = await db.from('events').select('*').order('order_index')
  evtMap = {}
  days.forEach(d => evtMap[d.day_number] = [])
  if (data) {
    data.forEach(e => {
      const d = days.find(x => x.id === e.day_id)
      if (d) { evtMap[d.day_number] = evtMap[d.day_number] || []; evtMap[d.day_number].push(e) }
    })
    Object.keys(evtMap).forEach(k => evtMap[k].sort((a,b) => (a.time_start||'').localeCompare(b.time_start||'')))
  }
}

async function loadCreds() {
  const { data } = await db.from('credentials').select('*').order('created_at')
  creds = data || []
}

      const idx = days.findIndex(d => d.id === p.new.id)
      if (idx !== -1) { days[idx] = { ...days[idx], ...p.new }; renderTabs(); if(curTab==='day') renderPanel() }
    })
    .on('postgres_changes',{event:'*',schema:'public',table:'events'}, async p => {
      await loadAllEvts()
      if (curTab==='day') renderPanel()
      const act = {INSERT:'新增了',UPDATE:'更新了',DELETE:'刪除了'}[p.eventType]
      toast(`✏️ ${p.new?.created_by||'有人'} ${act}：${p.new?.title||p.old?.title||'事件'}`)
    })
    .on('postgres_changes',{event:'*',schema:'public',table:'credentials'}, async () => {
      await loadCreds()
      if (curTab==='cred') renderPanel()
    })
    .on('postgres_changes',{event:'*',schema:'public',table:'prep_items'}, async () => {
      await loadPrepItems()

    })
    .on('postgres_changes',{event:'*',schema:'public',table:'expenses'}, async () => {

    .subscribe()
}

function setupPresence() {
  // Show self immediately — don't wait for Realtime sync
  online = [{ user_name: userName || '旅伴', color: userColor || '#aaa' }]
  renderPresence()

  try {
    // Remove old presence channel if exists (e.g. after changeUser)
    if (_presenceChannel) { db.removeChannel(_presenceChannel); _presenceChannel = null }
    const ch = db.channel('trip-presence', { config: { presence: { key: userName || 'guest' } } })
    _presenceChannel = ch

    const syncOnline = () => {
      const state = Object.values(ch.presenceState()).flat()
      // If sync returns data use it; otherwise keep showing self
      if (state.length > 0) { online = state; renderPresence() }
    }

    ch.on('presence', { event: 'sync'  }, syncOnline)
      .on('presence', { event: 'join'  }, syncOnline)
      .on('presence', { event: 'leave' }, syncOnline)
      .subscribe(async status => {
        console.debug('[presence] status:', status)
        if (status === 'SUBSCRIBED') {
          try {
            await ch.track({ user_name: userName || '旅伴', color: userColor || '#aaa', ts: Date.now() })
          } catch(e) { console.warn('[presence] track failed:', e) }
        } else if (status === 'CHANNEL_ERROR' || status === 'TIMED_OUT') {
          console.warn('[presence] channel error, showing self only')
        }
      })
  } catch(e) {
    console.warn('[presence] setup failed:', e)
  }
}

function renderPresence() {
  const dot = u => {
    const name  = u.user_name || '?'
    const color = u.color     || '#aaa'
    const init  = name[0].toUpperCase()
    return `<div class="p-dot" style="background:${color}" title="${name}">${init}</div>`
  }
  const mobDot = u => {
    const name  = u.user_name || '?'
    const color = u.color     || '#aaa'
    const init  = name[0].toUpperCase()
    return `<div class="p-dot" style="background:${color};width:22px;height:22px;font-size:.6rem" title="${name}">${init}</div>`
  }

  const bar = document.getElementById('presence-bar')
  if (bar) {
    bar.innerHTML = online.length
      ? online.map(dot).join('')
      : '<span class="p-label">只有你在線上</span>'
  }

  const mob = document.getElementById('presence-bar-mob')
  if (mob) mob.innerHTML = online.map(mobDot).join('')
}

const TYPE_CN = {meal:'餐廳',attraction:'景點',activity:'活動',transport:'交通',accommodation:'住宿'}

/* ── DRIVING DISTANCE ── */
const driveCache    = {}   // key: "mode:lat1,lng1->lat2,lng2"
const driveModeState = {}  // key: coordKey → current mode

const DRIVE_MODES = {
  driving: { emoji: '🚗', label: '開車',    base: 'https://router.project-osrm.org/route/v1/driving' },
  foot:    { emoji: '🚶', label: '步行',    base: 'https://routing.openstreetmap.de/routed-foot/route/v1/foot' },
  transit: { emoji: '🚌', label: '公共運輸', base: null },
}

function driveKey(a, b) { return `${a.lat},${a.lng}->${b.lat},${b.lng}` }
function driveSafeId(key) { return key.replace(/[^0-9.]/g,'_') }

function driveConnector(a, b) {
  if (!a.lat || !a.lng || !b.lat || !b.lng) return ''
  const key  = driveKey(a, b)
  const safe = driveSafeId(key)
  const mode = driveModeState[key] || 'driving'
  const tabs = Object.entries(DRIVE_MODES).map(([m, cfg]) =>
    `<button class="dm-btn${m===mode?' active':''}" onclick="switchDriveMode('${safe}','${m}')" title="${cfg.label}">${cfg.emoji}</button>`
  ).join('')
  const resultHtml = driveResultHtml(key, mode, a, b)
  return `
  <div class="drive-connector" id="dc-${safe}" data-key="${key}">
    <div class="drive-c-spacer"></div>
    <div class="drive-c-dot-col"></div>
    <div class="drive-c-body">
      <div id="drive-res-${safe}">${resultHtml}</div>
      <div class="drive-mode-tabs">${tabs}</div>
    </div>
  </div>`
}

function driveResultHtml(key, mode, a, b) {
  if (mode === 'transit') {
    const url = `https://www.google.com/maps/dir/${a.lat},${a.lng}/${b.lat},${b.lng}/data=!4m2!4m1!3e3`
    return `<a class="drive-pill" href="${url}" target="_blank">🚌 查看大眾運輸路線 ↗</a>`
  }
  const ckey   = `${mode}:${key}`
  const cached = driveCache[ckey]
  if (!cached)         return `<span class="drive-pill loading" id="dpill-${driveSafeId(key)}-${mode}">計算中...</span>`
  if (cached === 'err') return `<span class="drive-pill no-data">無法取得距離</span>`
  const { emoji } = DRIVE_MODES[mode]
  const dirUrl = mode === 'driving'
    ? `https://www.google.com/maps/dir/${a.lat},${a.lng}/${b.lat},${b.lng}/data=!4m2!4m1!3e0`
    : `https://www.google.com/maps/dir/${a.lat},${a.lng}/${b.lat},${b.lng}/data=!4m2!4m1!3e2`
  return `<a class="drive-pill" href="${dirUrl}" target="_blank">${emoji} ${cached.dist} · ${cached.time}</a>`
}

function switchDriveMode(safe, mode) {
  // find connector and extract key from stored data
  const dc = document.getElementById(`dc-${safe}`)
  if (!dc) return
  // restore key from safe id (reverse: _ could be . or ,) — store as data attr instead
  const key = dc.dataset.key
  if (!key) return
  driveModeState[key] = mode
  // update tab active state
  dc.querySelectorAll('.dm-btn').forEach((btn, i) => {
    btn.classList.toggle('active', Object.keys(DRIVE_MODES)[i] === mode)
  })
  // update result
  const [aLat, aLng, bLat, bLng] = key.replace('->',',').split(',').map(Number)
  const a = { lat: aLat, lng: aLng }, b = { lat: bLat, lng: bLng }
  const resEl = document.getElementById(`drive-res-${safe}`)
  if (resEl) resEl.innerHTML = driveResultHtml(key, mode, a, b)
  // fetch if needed
  if (mode !== 'transit') fetchDriving(a, b, mode)
}

async function fetchDriving(a, b, mode='driving') {
  if (!a.lat || !a.lng || !b.lat || !b.lng) return
  if (!DRIVE_MODES[mode]?.base) return
  const key  = driveKey(a, b)
  const ckey = `${mode}:${key}`
  if (driveCache[ckey]) return
  driveCache[ckey] = null   // in-flight

  try {
    const base = DRIVE_MODES[mode].base
    const url = `${base}/${a.lng},${a.lat};${b.lng},${b.lat}?overview=false`
    const res  = await fetch(url)
    const json = await res.json()
    if (json.code !== 'Ok' || !json.routes?.length) throw new Error('no route')

    const meters  = json.routes[0].distance
    const seconds = json.routes[0].duration
    const dist = meters  < 1000 ? `${Math.round(meters)} m` : `${(meters/1000).toFixed(1)} km`
    const time = seconds < 60   ? `${Math.round(seconds)} 秒`
               : seconds < 3600 ? `${Math.round(seconds/60)} 分鐘`
               : `${Math.floor(seconds/3600)} 小時 ${Math.round((seconds%3600)/60)} 分鐘`
    driveCache[ckey] = { dist, time }
  } catch(_) {
    driveCache[ckey] = 'err'
  }

  // Update DOM if still on page
  const safe    = driveSafeId(key)
  const curMode = driveModeState[key] || 'driving'
  if (curMode !== mode) return   // user already switched away
  const resEl = document.getElementById(`drive-res-${safe}`)
  if (!resEl) return
  resEl.innerHTML = driveResultHtml(key, mode, a, b)
}

        <div class="evt-foot-left">
          ${embedUrl ? `<button class="map-btn" id="mapbtn-${e.id}" onclick="toggleEvtPanel('${e.id}','map')">地圖</button>` : ''}

      ${(Array.isArray(e.cred_ids)&&e.cred_ids.length) ? `<div class="evt-panel" id="panel-cred-${e.id}">${renderEvtCredPillsInner(e)}</div>` : ''}
      ${(Array.isArray(e.links)&&e.links.filter(l=>l.url).length) ? `<div class="evt-panel" id="panel-link-${e.id}">${renderEvtLinksInner(e)}</div>` : ''}

/* ── CHECKLIST CARD RENDER ── */
function renderChecklist(e) {
  const items = Array.isArray(e.checklist) ? e.checklist : []
  if (!items.length) return ''
  const done = items.filter(i=>i.done).length
  return `
  <div class="checklist-section">
    <div class="checklist-label">
      <span>📋 待辦記事</span>
      <span class="cl-progress">${done}/${items.length}</span>
    </div>
    ${items.map((item,idx) => `
      <div class="cl-item">
        <input type="checkbox" class="cl-cb" ${item.done?'checked':''} onchange="toggleCheck('${e.id}',${idx},this.checked)"/>
        <span class="cl-text ${item.done?'done':''}" id="cl-text-${e.id}-${idx}">${escHtml(item.text)}</span>
      </div>`).join('')}
  </div>`
}

async function toggleCheck(evtId, idx, checked) {
  // Find the event across all days
  let evt = null
  Object.values(evtMap).forEach(arr => { const f=arr.find(x=>x.id===evtId); if(f) evt=f })
  if (!evt) return
  const items = Array.isArray(evt.checklist) ? [...evt.checklist] : []
  if (!items[idx]) return
  items[idx] = { ...items[idx], done: checked }
  // Optimistic UI
  evt.checklist = items
  const textEl = document.getElementById(`cl-text-${evtId}-${idx}`)
  if (textEl) textEl.classList.toggle('done', checked)
  // Update progress label
  const section = textEl?.closest('.checklist-section')
  if (section) {
    const prog = section.querySelector('.cl-progress')
    const done = items.filter(i=>i.done).length
    if (prog) prog.textContent = `${done}/${items.length}`
  }
  await db.from('events').update({ checklist: items, updated_at: new Date().toISOString() }).eq('id', evtId)
}

function buildRoute(evts) {
  const pts = evts.filter(e=>e.lat&&e.lng)
  if (pts.length < 2) return ''
  return 'https://www.google.com/maps/dir/'+pts.map(e=>`${e.lat},${e.lng}`).join('/')
}

function lighten(hex) {
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16)
  return `rgb(${Math.min(r+55,255)},${Math.min(g+55,255)},${Math.min(b+55,255)})`
}

let prepItems = []   // [{id, section, text, done, order_index, created_by}]

async function loadPrepItems() {
  const { data } = await db.from('prep_items').select('*').order('order_index')
  prepItems = data || []
}

function prepBySection(key) {
  return prepItems.filter(i => i.section === key)
}

function renderPrepPanel() {
  const sectionsHtml = PREP_SECTIONS.map(s => {
    const items = prepBySection(s.key)
    const done  = items.filter(i=>i.done).length
    const pct   = items.length ? Math.round(done/items.length*100) : 0
    const itemsHtml = items.map(item => `
      <div class="prep-item">
        <input type="checkbox" ${item.done?'checked':''} onchange="togglePrepItem('${item.id}',this.checked)"/>
        <span class="prep-item-text${item.done?' done':''}" contenteditable="true"
          onblur="renamePrepItem('${item.id}',this.textContent)">${escHtml(item.text)}</span>
        <button class="prep-item-del" onclick="deletePrepItem('${item.id}')" title="刪除">×</button>
      </div>`).join('')
    return `
      <div class="prep-section">
        <div class="prep-section-head">
          <span class="prep-section-title">${s.icon} ${s.title}</span>
          <span class="prep-progress">${done}/${items.length} 完成</span>
        </div>
        ${items.length ? `<div class="prep-bar"><div class="prep-bar-fill" style="width:${pct}%"></div></div>` : ''}
        <div class="prep-list">${itemsHtml}</div>
        <div class="prep-add-row">
          <input class="prep-add-inp" id="prep-inp-${s.key}" type="text" placeholder="${s.placeholder}"
            onkeydown="if(event.key==='Enter')addPrepItem('${s.key}')"/>
          <button class="btn btn-primary btn-sm" onclick="addPrepItem('${s.key}')">＋ 新增</button>
        </div>
      </div>`
  })

  document.getElementById('main').innerHTML = `
    <div class="panel-anim">
      <div class="cred-top">
        <h2>📋 行前注意事項</h2>
      </div>
      <div class="prep-grid">
        ${sectionsHtml[0]}
        ${sectionsHtml[1]}
      </div>
    </div>`
}

async function addPrepItem(key) {
  const inp = document.getElementById(`prep-inp-${key}`)
  const text = inp?.value.trim()
  if (!text) return
  inp.value = ''
  const order_index = prepBySection(key).length + 1
  const { error } = await db.from('prep_items').insert({ section: key, text, done: false, order_index, created_by: userName })
  if (error) toast(`❌ 新增失敗：${error.message}`)
}

async function togglePrepItem(id, done) {
  await db.from('prep_items').update({ done }).eq('id', id)
}

async function deletePrepItem(id) {
  await db.from('prep_items').delete().eq('id', id)
}

async function renamePrepItem(id, text) {
  const trimmed = text.trim()
  if (!trimmed) return
  await db.from('prep_items').update({ text: trimmed }).eq('id', id)
}

function extractCoordsFromText(text) {
  if (!text) return null
  let m

  // ── Pattern 1: @lat,lng,zoom  (desktop Maps URL — trailing comma required)
  m = text.match(/@([-0-9.]+),([-0-9.]+),/)
  if (m) {
    const lat = parseFloat(m[1]), lng = parseFloat(m[2])
    if (!isNaN(lat) && !isNaN(lng)) return { lat, lng }
  }

  // ── Pattern 2: !3d<lat>!4d<lng>  (place / embed URLs — must be adjacent)
  m = text.match(/!3d([-0-9.]+)!4d([-0-9.]+)/)
  if (m) {
    const lat = parseFloat(m[1]), lng = parseFloat(m[2])
    if (!isNaN(lat) && !isNaN(lng)) return { lat, lng }
  }

  // ── Pattern 3: ?q=lat,lng  or  &query=lat,lng  or  center=lat,lng
  m = text.match(/[?&](?:q|query|center)=([-0-9.]+),([-0-9.]+)/)
  if (m) {
    const lat = parseFloat(m[1]), lng = parseFloat(m[2])
    if (!isNaN(lat) && !isNaN(lng)) return { lat, lng }
  }

  // ── Pattern 4: ll=lat,lng  or  sll=lat,lng
  m = text.match(/[?&]s?ll=([-0-9.]+),([-0-9.]+)/)
  if (m) {
    const lat = parseFloat(m[1]), lng = parseFloat(m[2])
    if (!isNaN(lat) && !isNaN(lng)) return { lat, lng }
  }

  // ── Pattern 5: "lat":xx,"lng":xx  (embedded JSON)
  m = text.match(/"lat"\s*:\s*([-0-9.]+)\s*,\s*"lng"\s*:\s*([-0-9.]+)/)
  if (m) {
    const lat = parseFloat(m[1]), lng = parseFloat(m[2])
    if (!isNaN(lat) && !isNaN(lng)) return { lat, lng }
  }

  // ── Pattern 6: [[lat,lng  (APP_INITIALIZATION_STATE data arrays)
  m = text.match(/\[{1,2}([-0-9.]{6,}),([-0-9.]{6,})/)
  if (m) {
    const lat = parseFloat(m[1]), lng = parseFloat(m[2])
    if (!isNaN(lat) && !isNaN(lng) && Math.abs(lat) <= 90 && Math.abs(lng) <= 180) return { lat, lng }
  }

  return null
}

// Extract all Maps-style URLs from an HTML string
function extractMapsUrlsFromHtml(html) {
  const urls = []
  const re = /https?:\/\/(?:www\.)?(?:maps\.app\.goo\.gl|google\.com\/maps)[^\s"'<>)]+/g
  let m
  while ((m = re.exec(html)) !== null) urls.push(m[0].replace(/&amp;/g, '&'))
  return urls
}

async function fetchViaAllorigins(targetUrl, timeout = 10000) {
  const res  = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`,
    { signal: AbortSignal.timeout(timeout) })
  if (!res.ok) throw new Error('allorigins error')
  return res.json()  // { contents, status: { url, http_code } }
}

// Normalise HTML entities and unicode escapes commonly found in embedded URLs
function decodeHtmlUrl(s) {
  return s.replace(/&amp;/g, '&')
          .replace(/\\u003d/gi, '=').replace(/\\u0026/gi, '&')
          .replace(/\\u002f/gi, '/').replace(/\\u003f/gi, '?')
}

// Extract every candidate destination URL from a Firebase Dynamic Link HTML page
function extractCandidateUrls(html) {
  const decoded = decodeHtmlUrl(html)
  const seen = new Set()
  const add = u => { if (u && u.startsWith('http')) seen.add(decodeHtmlUrl(u)) }

  // 1. meta http-equiv="refresh" (both attr orderings, with or without spaces around ;)
  const metaRe = [
    /http-equiv=["']refresh["'][^>]*content=["'][^"']*?url\s*=\s*([^"'\s>]+)/gi,
    /content=["'][^"']*?url\s*=\s*([^"'\s>]+)[^>]*http-equiv=["']refresh["']/gi,
  ]
  for (const re of metaRe) {
    let m; re.lastIndex = 0
    while ((m = re.exec(decoded)) !== null) add(m[1])
  }

  // 2. JS patterns — Firebase embeds FALLBACK_URL / window.location in script tags
  const jsRe = [
    /(?:FALLBACK_URL|fallbackUrl|fallback_url|deepLink|deeplink|redirect(?:Url|_url)?|destination)\s*[=:]\s*["'`]([^"'`]+)["'`]/gi,
    /window\.location(?:\.href)?\s*=\s*["'`]([^"'`]+)["'`]/gi,
    /location\.(?:href|replace)\s*\(\s*["'`]([^"'`]+)["'`]/gi,
    // JSON key "url": "https://..."
    /"url"\s*:\s*"(https:\/\/[^"]+)"/gi,
  ]
  for (const re of jsRe) {
    let m; re.lastIndex = 0
    while ((m = re.exec(decoded)) !== null) add(m[1])
  }

  // 3. og:url / canonical
  let m
  m = decoded.match(/property=["']og:url["'][^>]*content=["']([^"']+)["']/i)
   || decoded.match(/content=["']([^"']+)["'][^>]*property=["']og:url["']/i)
  if (m) add(m[1])
  m = decoded.match(/<link[^>]*rel=["']canonical["'][^>]*href=["']([^"']+)["']/i)
  if (m) add(m[1])

  // 4. Any Google Maps URL in the raw text (most reliable net)
  const anyMaps = /https?:\/\/(?:maps\.app\.goo\.gl|(?:www\.)?google\.com\/maps|maps\.google\.com)[^\s"'`<>\\]+/g
  let am; anyMaps.lastIndex = 0
  while ((am = anyMaps.exec(decoded)) !== null) add(am[0])

  return [...seen]
}

async function resolveShortMapsUrl(url) {
  // ── Step 1: fetch via allorigins ──────────────────────────────────────────
  let json
  try { json = await fetchViaAllorigins(url, 12000) } catch(_) {}

  if (json) {
    const html = json?.contents || ''
    const reportedUrl = decodeHtmlUrl(json?.status?.url || '')
    console.debug('[resolveShortMapsUrl] allorigins status.url:', reportedUrl)
    console.debug('[resolveShortMapsUrl] HTML snippet:', html.slice(0, 800))

    // 1a. Did allorigins end up at a Maps URL with coords?
    let coords = extractCoordsFromText(reportedUrl)
    if (coords) return coords

    // 1b. Extract all candidate destination URLs from the Firebase HTML
    const candidates = extractCandidateUrls(html)
    console.debug('[resolveShortMapsUrl] candidates:', candidates)

    // 1c. Try coords directly from each candidate URL string
    for (const u of candidates) {
      coords = extractCoordsFromText(u)
      if (coords) return coords
    }

    // 1d. Full decoded-text scan (catches APP_INITIALIZATION_STATE data arrays)
    coords = extractCoordsFromText(decodeHtmlUrl(html))
    if (coords) return coords

    // 1e. For the first real Maps URL candidate, fetch it via allorigins too
    const mapsCandidate = candidates.find(u =>
      (u.includes('google.com/maps') || u.includes('maps.google')) &&
      !u.includes('maps.app.goo.gl'))
    if (mapsCandidate) {
      try {
        const json2 = await fetchViaAllorigins(mapsCandidate, 9000)
        coords = extractCoordsFromText(decodeHtmlUrl(json2?.status?.url || ''))
        if (coords) return coords
        coords = extractCoordsFromText(decodeHtmlUrl(json2?.contents || ''))
        if (coords) return coords
      } catch(_) {}
    }
  }

  // ── Step 2: fallback via corsproxy.io ─────────────────────────────────────
  try {
    const res = await fetch(`https://corsproxy.io/?${encodeURIComponent(url)}`,
      { redirect: 'follow', signal: AbortSignal.timeout(12000) })
    const text = await res.text()
    const finalUrl = res.url.includes('corsproxy.io')
      ? decodeURIComponent(res.url.split('?').slice(1).join('?'))
      : res.url
    let coords = extractCoordsFromText(finalUrl)
    if (coords) return coords
    // also parse meta refresh / JS from corsproxy result
    for (const u of extractCandidateUrls(text)) {
      coords = extractCoordsFromText(u)
      if (coords) return coords
    }
    coords = extractCoordsFromText(decodeHtmlUrl(text))
    if (coords) return coords
  } catch(_) {}

  return null
}

// Use mapu.retiolus.net/unshortener via CORS proxies (mapu itself has no CORS headers)
async function resolveViaMapu(url) {
  const mapu = `https://mapu.retiolus.net/unshortener?link=${encodeURIComponent(url)}`

  // Try multiple CORS proxies in order
  const proxies = [
    // corsproxy.io — two formats
    `https://corsproxy.io/?${encodeURIComponent(mapu)}`,
    `https://corsproxy.io/?url=${encodeURIComponent(mapu)}`,
    // allorigins raw — returns content directly, no wrapper
    `https://api.allorigins.win/raw?url=${encodeURIComponent(mapu)}`,
    // allorigins get — returns { contents: "...", status: {...} }
    `https://api.allorigins.win/get?url=${encodeURIComponent(mapu)}`,
  ]

  for (const proxy of proxies) {
    try {
      const res = await fetch(proxy, { signal: AbortSignal.timeout(12000) })
      if (!res.ok) continue
      const text = await res.text()
      // allorigins /get wraps in { contents: "...", status: {...} }
      let json
      try { json = JSON.parse(text) } catch { continue }
      // unwrap allorigins /get
      if (json?.contents && typeof json.contents === 'string') {
        try { json = JSON.parse(json.contents) } catch { continue }
      }
      if (json?.lat != null && json?.long != null) {
        console.debug('[mapu] success via', proxy, json)
        return json
      }
    } catch(e) {
      console.debug('[mapu] proxy failed:', proxy, e.message)
    }
  }
  throw new Error('all mapu proxies failed')
  // returns: { full_link, lat, long, steps, nominatim, timestamp }
}

async function autoFillFromMapsUrl() {
  const url = document.getElementById('f-maps-full').value.trim()
  const status = document.getElementById('f-maps-status')
  if (!url) return

  status.textContent = '解析中...'

  let lat = null, lng = null

  // ── Step 1: Try mapu.retiolus.net (handles both short and full URLs) ──────
  try {
    status.textContent = '解析連結中（mapu）...'
    const data = await resolveViaMapu(url)
    if (data?.lat != null && data?.long != null) {
      lat = parseFloat(data.lat)
      lng = parseFloat(data.long)
    }
    // If mapu returned a full_link but no coords, try parsing the full link
    if ((!lat || isNaN(lat)) && data?.full_link) {
      const coords = extractCoordsFromText(data.full_link)
      if (coords) { lat = coords.lat; lng = coords.lng }
    }
  } catch(e) {
    console.warn('[autoFill] mapu failed:', e)
  }

  // ── Step 2: Fallback — extract coords directly from URL text ──────────────
  if (!lat || isNaN(lat)) {
    const coords = extractCoordsFromText(url)
    if (coords) { lat = coords.lat; lng = coords.lng }
  }

  // ── Step 3: Fallback — legacy proxy resolvers (for edge cases) ────────────
  if ((!lat || isNaN(lat)) && (url.includes('goo.gl') || url.includes('maps.app'))) {
    status.textContent = '備用方式解析中...'
    const coords = await resolveShortMapsUrl(url)
    if (coords) { lat = coords.lat; lng = coords.lng }
  }

  if (!lat || isNaN(lat)) {
    status.textContent = '⚠️ 無法解析座標，請確認為有效的 Google Maps 連結'
    return
  }

  // Fill lat/lng fields
  document.getElementById('f-lat').value = lat
  document.getElementById('f-lng').value = lng

  // ── Step 4: Reverse geocode via Nominatim ────────────────────────────────
  try {
    status.textContent = '取得地址中...'
    const res  = await fetch(
      `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json`,
      { headers: { 'Accept-Language': 'zh-TW,zh;q=0.9' } }
    )
    const data = await res.json()
    const addrEl = document.getElementById('f-addr')
    if (data?.address && !addrEl.value.trim()) {
      const a = data.address
      // Format: "{house_number} {street/suburb}, {city}, {state} {postcode}{country}"
      // e.g. "285 Untenbaru, Nago, Okinawa 905-1634日本"
      const street   = a.road || a.pedestrian || a.footway || a.path || a.suburb || a.neighbourhood || a.quarter || ''
      const streetFull = a.house_number ? `${a.house_number} ${street}`.trim() : street
      const city     = a.city || a.town || a.village || a.county || ''
      const state    = a.state || a.province || ''
      const postcode = a.postcode || ''
      const country  = a.country || ''
      // Assemble: "street, city, state postcode + country" (omit empty parts)
      const line1 = [streetFull, city].filter(Boolean).join(', ')
      const line2 = [state, postcode].filter(Boolean).join(' ')
      const parts = [line1, line2 ? line2 + country : country].filter(Boolean)
      addrEl.value = parts.length ? parts.join(', ') : data.display_name
    }
    status.textContent = `✓ 已填入座標 (${lat.toFixed(6)}, ${lng.toFixed(6)})`
  } catch(_) {
    status.textContent = `✓ 已填入座標 (${lat.toFixed(6)}, ${lng.toFixed(6)})（地址解析失敗，可手動填寫）`
  }
}

async function saveEvt() {
  const title=document.getElementById('f-title').value.trim()
  if (!title) { document.getElementById('f-title').focus(); return }

  // Merge checklist items — preserve existing done state by matching text
  let existingCl = []
  if (editEvtId) {
    let e=null; Object.values(evtMap).forEach(arr=>{const f=arr.find(x=>x.id===editEvtId); if(f) e=f})
    existingCl = Array.isArray(e?.checklist) ? e.checklist : []
  }
  const clItems = Array.from(document.querySelectorAll('#f-cl-list .fcl-item')).map((_, i) => {
    const inp = document.getElementById(`fcl-inp-${i}`)
    const text = inp ? inp.value.trim() : ''
    if (!text) return null
    const existing = existingCl.find(x=>x.text===text)
    return { text, done: existing ? existing.done : false }
  }).filter(Boolean)

  const payload = {
    type:            document.getElementById('f-type').value,
    emoji:           document.getElementById('f-emoji').value.trim()||'📍',
    title,
    time_start:      document.getElementById('f-tstart').value||null,
    time_end:        document.getElementById('f-tend').value||null,
    description:     document.getElementById('f-desc').value.trim()||null,
    address:         document.getElementById('f-addr').value.trim()||null,
    lat:             parseFloat(document.getElementById('f-lat').value)||null,
    lng:             parseFloat(document.getElementById('f-lng').value)||null,
    google_maps_url: document.getElementById('f-maps-short').value.trim()||null,
    checklist:       clItems,
    links:           getLinkItems(),
    cred_ids:        getPickedCredIds(),
    updated_at:      new Date().toISOString(),
  }

  // Read day_id from the selector (supports moving event to a different day)
  const selectedDayId = document.getElementById('f-day-id').value

  let error
  if (editEvtId) {
    payload.day_id = selectedDayId
    ;({ error } = await db.from('events').update(payload).eq('id', editEvtId))
  } else {
    const targetDay = days.find(d => d.id === selectedDayId)
    payload.day_id      = selectedDayId
    payload.order_index = (evtMap[targetDay?.day_number]||[]).length + 1
    payload.created_by  = userName
    ;({ error } = await db.from('events').insert(payload))
  }

  if (error) {
    // 欄位不存在時，逐步移除後重試
    if (error.code === '42703' || error.message?.includes('checklist') || error.message?.includes('cred_ids') || error.message?.includes('links')) {
      delete payload.checklist; delete payload.cred_ids; delete payload.links
      let editEvtIdCopy = editEvtId
      if (editEvtIdCopy) {
        ;({ error } = await db.from('events').update(payload).eq('id', editEvtIdCopy))
      } else {
        ;({ error } = await db.from('events').insert(payload))
      }
      if (!error) {
        toast('⚠️ 儲存成功，但請在 Supabase SQL Editor 執行：\nalter table events add column if not exists checklist jsonb default \'[]\'::jsonb;')
      }
    }
    if (error) {
      toast(`❌ 儲存失敗：${error.message}`)
      console.error('saveEvt error:', error)
      return
    }
  }

  closeEvtModal()
}

async function deleteEvt() {
  if (!editEvtId||!confirm('確定要刪除這個行程事件嗎？')) return
  await db.from('events').delete().eq('id',editEvtId)
  closeEvtModal()
}

async function saveCred() {

  if (!title) { document.getElementById('c-title').focus(); return }

    saveBtn.innerHTML = '<span class="upload-spinner"></span>上傳中...'

      .from('cred-images').upload(path, credImgFile, { upsert: true })

function _renderBudgetPanel(main) {

  // Filter
  const filtered = expFilter === 'all' ? expenses : expenses.filter(e => e.day_id === expFilter)

  // Totals by currency
  const totals = {}
  filtered.forEach(e => {
    totals[e.currency] = (totals[e.currency] || 0) + Number(e.amount)
  })
  const totalStr = Object.entries(totals).map(([c,v]) => `${Math.round(v).toLocaleString()} ${c}`).join('　') || '0'

  // Category breakdown
  const byCat = {}
  Object.keys(EXP_CATS).forEach(k => byCat[k] = 0)
  filtered.forEach(e => { byCat[e.category] = (byCat[e.category] || 0) + Number(e.amount) })
  const maxCat = Math.max(...Object.values(byCat), 1)

  // Day filter buttons (use data-attr to avoid quote conflicts in uuid)
  const dayBtns =
    `<button class="cf-btn${expFilter==='all'?' active':''}" onclick="setExpFilter('all')">全部</button>` +
    days.map(d =>
      `<button class="cf-btn${expFilter===d.id?' active':''}" data-fid="${d.id}" onclick="setExpFilter(this.dataset.fid)">第${d.day_number}天</button>`
    ).join('')

  // Category bars
  const catBars = Object.entries(EXP_CATS).map(([k, cfg]) => {
    const amt = byCat[k] || 0
    if (!amt) return ''
    const pct = (amt / maxCat * 100).toFixed(1)
    return `<div class="cat-bar-row">
      <span class="cat-bar-label">${cfg.label}</span>
      <div class="cat-bar-track"><div class="cat-bar-fill" style="width:${pct}%;background:${cfg.color}"></div></div>
      <span class="cat-bar-amt">${Math.round(amt).toLocaleString()}</span>
    </div>`
  }).join('')

  // Expense list
  const listHtml = filtered.length
    ? filtered.slice().reverse().map(e => {
        const cfg = EXP_CATS[e.category] || EXP_CATS.other
        const day = days.find(d => d.id === e.day_id)
        const dayLabel = day ? `第${day.day_number}天` : ''
        return `<div class="expense-item">
          <div class="expense-cat-dot" style="background:${cfg.color}"></div>
          <div class="expense-info">
            <div class="expense-title">${escHtml(e.title)}</div>
            <div class="expense-meta">${cfg.label}${dayLabel ? '・'+dayLabel : ''}${e.note ? '・'+escHtml(e.note) : ''}</div>
          </div>
          <div class="expense-amount">${Number(e.amount).toLocaleString()} ${e.currency}</div>
          <div class="expense-actions">
            <button class="btn btn-ghost btn-sm" onclick="openEditExp('${e.id}')">編輯</button>
          </div>
        </div>`
      }).join('')
    : '<div class="empty">還沒有支出紀錄</div>'

  main.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px">
      <h2 style="font-size:1.25rem;font-weight:700;margin:0">💰 記帳</h2>

    </div>
    <div class="budget-summary">
      <div class="budget-stat">
        <div class="budget-stat-label">總支出</div>
        <div class="budget-stat-val" style="font-size:.95rem">${totalStr}</div>
      </div>
      <div class="budget-stat">
        <div class="budget-stat-label">筆數</div>
        <div class="budget-stat-val">${filtered.length}</div>
      </div>
      <div class="budget-stat">
        <div class="budget-stat-label">天數</div>
        <div class="budget-stat-val">${days.length}</div>
      </div>
    </div>
    ${catBars ? `<div class="budget-cat-bar">${catBars}</div>` : ''}
    <div class="budget-filters">${dayBtns}</div>
    <div class="expense-list">${listHtml}</div>
  `
}

    title,
    amount,
    currency: document.getElementById('ef-currency').value,
    category: document.getElementById('ef-category').value,
    note:     document.getElementById('ef-note').value.trim() || null,
    day_id:   document.getElementById('ef-day').value || null,
    updated_at: new Date().toISOString(),
  }

  let error
  if (editExpId) {
    ;({ error } = await db.from('expenses').update(payload).eq('id', editExpId))
  } else {
    payload.created_by = userName
    ;({ error } = await db.from('expenses').insert(payload))
  }
  if (error) { toast(`❌ 儲存失敗：${error.message}`); return }
  closeExpModal()
}

// ── Receipt OCR via Claude Vision ────────────────────
async function onReceiptPicked(input) {
  const file = input.files?.[0]
  if (!file) return
  const status = document.getElementById('receipt-status')

  if (!ANTHROPIC_KEY) {
    status.textContent = '⚠️ 請先在程式碼中填入 ANTHROPIC_KEY'
    return
  }

  status.textContent = '分析收據中...'
  input.value = ''  // reset so same file can be picked again

  try {
    // Convert image to base64
    const base64 = await new Promise((res, rej) => {
      const reader = new FileReader()
      reader.onload = e => res(e.target.result.split(',')[1])
      reader.onerror = rej
      reader.readAsDataURL(file)
    })
    const mimeType = file.type || 'image/jpeg'

    // Call Claude API
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': ANTHROPIC_KEY,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-client-side-access-key-allowed': 'true',
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 512,
        messages: [{
          role: 'user',
          content: [
            { type: 'image', source: { type: 'base64', media_type: mimeType, data: base64 } },
            { type: 'text', text:
`分析這張收據圖片，以純 JSON 格式回傳以下欄位（不要有其他文字）：
{
  "title": "商店名稱或主要消費（10字以內）",
  "amount": 數字（總金額，不含貨幣符號，若有多幣別取主要一種）,
  "currency": "JPY 或 TWD 或 USD（依收據上的貨幣決定）",
  "category": "food 或 transport 或 hotel 或 shopping 或 ticket 或 other",
  "items": "所有購買項目（逗號分隔，簡短描述）"
}` }
          ]
        }]
      })
    })

    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}))
      throw new Error(err?.error?.message || `HTTP ${resp.status}`)
    }

    const data = await resp.json()
    const text = data.content?.[0]?.text || ''

    // Parse JSON — strip markdown fences if present
    const jsonStr = text.replace(/```json\n?|\n?```/g, '').trim()
    const result = JSON.parse(jsonStr)

    // Fill form fields
    if (result.title)    document.getElementById('ef-title').value    = result.title
    if (result.amount)   document.getElementById('ef-amount').value   = result.amount
    if (result.currency && ['JPY','TWD','USD'].includes(result.currency))
                         document.getElementById('ef-currency').value = result.currency
    if (result.category && ['food','transport','hotel','shopping','ticket','other'].includes(result.category))
                         document.getElementById('ef-category').value = result.category
    if (result.items)    document.getElementById('ef-note').value     = result.items

    status.textContent = '✓ 已自動填入'
  } catch(e) {
    console.error('[receipt]', e)
    status.textContent = `⚠️ 分析失敗：${e.message}`
  }
}

async function deleteExp() {
  if (!editExpId) return
  const { error } = await db.from('expenses').delete().eq('id', editExpId)
  if (error) { toast(`❌ 刪除失敗：${error.message}`); return }
  closeExpModal()
}
