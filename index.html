<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🏝 2026沖繩週年之旅</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    /* ══════════════════════════════════════
       NOTION-STYLE DESIGN SYSTEM
    ══════════════════════════════════════ */
    :root {
      /* Palette */
      --bg:       #ffffff;
      --sb-bg:    #f7f6f3;
      --text:     #37352f;
      --muted:    #9b9a97;
      --faint:    #e9e9e7;
      --hover:    #efefef;
      --accent:   #2383e2;
      --accent-lt:#e8f3fc;
      --red:      #e03e3e;
      --red-lt:   #fbe4e4;
      --border:   #e9e9e7;

      /* Tokens */
      --font: 'Inter','PingFang TC','Microsoft JhengHei',system-ui,sans-serif;
      --r:    4px;
      --r-md: 6px;
      --r-lg: 8px;
      --sb-w: 240px;
      --mob-bar: 52px;
      --tab-bar: 62px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── LAYOUT ── */
    #app { display: flex; min-height: 100vh; }

    /* ── SIDEBAR ── */
    .sidebar {
      width: var(--sb-w);
      flex-shrink: 0;
      background: var(--sb-bg);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0; left: 0; bottom: 0;
      z-index: 200;
      overflow: hidden;
      transition: transform .22s ease;
    }
    .sidebar.collapsed { transform: translateX(calc(-1 * var(--sb-w))); }

    .sb-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 14px 10px;
      border-bottom: 1px solid var(--border);
    }
    .sb-icon { font-size: 1.25rem; flex-shrink: 0; }
    .sb-title { font-weight: 700; font-size: .9rem; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sb-sub   { font-size: .72rem; color: var(--muted); margin-top: 1px; }

    .sb-section {
      padding: 18px 10px 6px;
      font-size: .68rem;
      font-weight: 600;
      letter-spacing: .06em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .sb-nav { flex: 1; overflow-y: auto; padding: 4px 6px; scrollbar-width: none; }
    .sb-nav::-webkit-scrollbar { display: none; }

    .sb-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border-radius: var(--r-md);
      cursor: pointer;
      font-size: .86rem;
      font-weight: 500;
      color: var(--text);
      border: none;
      background: none;
      width: 100%;
      text-align: left;
      transition: background .12s;
      white-space: nowrap;
    }
    .sb-item:hover  { background: var(--hover); }
    .sb-item.active { background: #e3e2df; font-weight: 600; }
    .sb-item .sb-emoji {
      font-size: 1rem; flex-shrink: 0; line-height: 1; width: 20px; text-align: center;
    }
    .sb-item .sb-label { flex: 1; overflow: hidden; text-overflow: ellipsis; }
    .sb-item .sb-day-n {
      font-size: .7rem; color: var(--muted); font-weight: 400;
    }

    .sb-footer {
      border-top: 1px solid var(--border);
      padding: 10px 8px;
    }
    .sb-presence { display: flex; gap: 5px; align-items: center; flex-wrap: wrap; padding: 6px 6px 8px; }
    .p-dot {
      width: 26px; height: 26px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: .68rem; font-weight: 700; color: #fff;
      position: relative; cursor: default; flex-shrink: 0;
    }
    .p-dot::after {
      content:''; position: absolute; bottom: 0; right: 0;
      width: 8px; height: 8px; border-radius: 50%;
      background: #4ade80; border: 1.5px solid var(--sb-bg);
    }
    .p-label { font-size: .75rem; color: var(--muted); }
    .sb-change-btn {
      width: 100%; padding: 6px 10px; border-radius: var(--r-md);
      border: none; background: none; cursor: pointer;
      font-size: .82rem; color: var(--muted); font-family: var(--font);
      text-align: left; transition: background .12s;
    }
    .sb-change-btn:hover { background: var(--hover); color: var(--text); }

    /* ── MOBILE HEADER ── */
    .mob-header {
      display: none;
      position: fixed; top: 0; left: 0; right: 0;
      height: var(--mob-bar);
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      z-index: 150;
      align-items: center;
      padding: 0 14px;
      gap: 10px;
    }
    .mob-menu-btn {
      width: 32px; height: 32px;
      border: none; background: none;
      border-radius: var(--r-md);
      cursor: pointer; font-size: 1rem;
      display: flex; align-items: center; justify-content: center;
      color: var(--muted);
    }
    .mob-menu-btn:hover { background: var(--hover); }
    .mob-hdr-title { font-weight: 600; font-size: .9rem; flex: 1; }
    .mob-presence  { display: flex; gap: 4px; }

    /* ── MOBILE TOP TABS ── */
    .mob-tabs {
      display: none;
      position: fixed; left: 0; right: 0;
      top: var(--mob-bar);
      height: var(--tab-bar);
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      z-index: 149;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .mob-tabs::-webkit-scrollbar { display: none; }
    .mob-tabs-inner {
      display: flex;
      height: 100%;
      min-width: max-content;
      padding: 0 4px;
      gap: 2px;
      align-items: center;
    }
    .mob-tab {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 6px 13px; gap: 1px;
      border: none; cursor: pointer;
      color: var(--muted); white-space: nowrap;
      min-width: 60px;
      border-radius: var(--r-md);
      background: none;
      font-family: var(--font);
      transition: background .12s, color .12s;
      height: 50px;
    }
    .mob-tab:hover  { background: var(--hover); color: var(--text); }
    .mob-tab.active { background: #e9e9e7; color: var(--text); }
    .mt-dayn {
      font-size: .63rem; font-weight: 500;
      color: inherit; opacity: .6;
      line-height: 1.4; letter-spacing: .01em;
    }
    .mt-date {
      font-size: .88rem; font-weight: 600;
      line-height: 1.25; letter-spacing: -.02em;
      color: inherit;
    }
    .mt-week {
      font-size: .63rem; font-weight: 400;
      line-height: 1.4; color: inherit; opacity: .6;
    }
    .mt-icon  { font-size: 1rem; line-height: 1.5; }
    /* today: date number highlight */
    .mob-tab.today .mt-date {
      background: var(--text); color: var(--bg);
      border-radius: 4px; padding: 0 5px;
    }

    /* Sidebar overlay for mobile */
    .sb-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.3);
      z-index: 190;
    }
    .sb-overlay.open { display: block; }

    /* ── CONTENT AREA ── */
    .content-area {
      flex: 1;
      margin-left: var(--sb-w);
      min-width: 0;
    }
    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 32px 28px 80px;
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
    .panel-anim { animation: fadeUp .22s ease; }

    /* ── DAY HERO ── */
    .day-hero {
      margin-bottom: 28px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }
    .day-hero-top {
      display: flex; align-items: center; justify-content: space-between;
      gap: 10px; flex-wrap: wrap; margin-bottom: 4px;
    }
.day-title-row {
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap; width: 100%;
    }
    .day-icon { font-size: 2rem; line-height: 1; flex-shrink: 0; }
    .day-h1 {
      font-size: 1.7rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.2;
    }
    .day-theme {
      font-size: .88rem;
      color: var(--muted);
      margin-top: 6px;
    }
    .day-actions {
      display: flex; gap: 6px; align-items: center; flex-wrap: wrap;
      margin-top: 12px;
    }

    /* ── BUTTONS ── */
    .btn {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 6px 12px; border-radius: var(--r-md);
      border: 1px solid var(--border);
      font-family: var(--font); font-size: .82rem; font-weight: 500;
      cursor: pointer; transition: background .12s;
      background: var(--bg); color: var(--text);
      white-space: nowrap;
    }
    .btn:hover { background: var(--hover); }
    .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    .btn-primary:hover { background: #1a73d4; border-color: #1a73d4; }
    .btn-danger  { background: var(--red-lt); color: var(--red); border-color: #f5c6c6; }
    .btn-danger:hover  { background: #f9d4d4; }
    .btn-sm { padding: 4px 9px; font-size: .76rem; }
    .btn-ghost { background: transparent; color: var(--muted); border-color: var(--border); }
    .btn-ghost:hover { background: var(--hover); color: var(--text); }
    .btn-full { width: 100%; justify-content: center; margin-top: 6px; }
    .btn-route { font-size: .78rem; }

    /* ── TIMELINE ── */
    .timeline { position: relative; }
    .timeline::before {
      content:''; position:absolute;
      left: 66px; top: 0; bottom: 0;
      width: 1px; background: var(--border);
    }
    .tl-item { display: flex; gap: 0; margin-bottom: 10px; align-items: stretch; }
    .tl-time {
      width: 56px; flex-shrink: 0;
      display: flex; flex-direction: column;
      align-items: flex-end;
      padding-top: 13px;
      padding-right: 0;
      gap: 0;
    }
    .tl-time-start {
      font-size: .72rem; font-weight: 700;
      color: var(--text);
      font-variant-numeric: tabular-nums;
      letter-spacing: -.01em;
      line-height: 1.3;
    }
    .tl-time-end {
      font-size: .66rem; font-weight: 400;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      line-height: 1.3;
    }
    .tl-dot-wrap {
      flex-shrink: 0; width: 21px;
      display: flex; flex-direction: column;
      align-items: center;
      padding-top: 16px;
    }
    .tl-dot {
      width: 9px; height: 9px; border-radius: 50%;
      background: var(--bg);
      border: 2px solid var(--border);
      flex-shrink: 0;
    }
    .tl-dot-line {
      width: 1px; flex: 1;
      background: var(--border);
      margin-top: 3px;
      min-height: 0;
    }

    /* Event block (Notion-style flat block) */
    .evt-card {
      flex: 1;
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      overflow: hidden;
      transition: box-shadow .15s, border-color .15s;
      background: var(--bg);
    }
    .evt-card:hover { border-color: #d3d2cf; box-shadow: 0 1px 6px rgba(0,0,0,.06); }
    .evt-head { padding: 11px 13px 7px; display: flex; align-items: flex-start; gap: 10px; }
    .evt-emoji { font-size: 1.25rem; flex-shrink: 0; line-height: 1.3; }
    .evt-info { flex: 1; min-width: 0; }
    .evt-title { font-weight: 600; font-size: .93rem; line-height: 1.35; }
    .evt-meta  { display: flex; gap: 6px; align-items: center; margin-top: 4px; flex-wrap: wrap; }
    .type-badge {
      font-size: .65rem; font-weight: 600;
      padding: 2px 7px; border-radius: 3px;
      letter-spacing: .02em;
    }
    .evt-desc { font-size: .84rem; color: #5c5c5a; padding: 0 13px 8px; line-height: 1.6; }
    .evt-addr {
      display: flex; align-items: center; gap: 5px;
      font-size: .78rem; color: var(--accent);
      padding: 0 13px 9px; text-decoration: none;
      word-break: break-all;
    }
    .evt-addr:hover { text-decoration: underline; }
    .evt-foot {
      display: flex; gap: 6px; padding: 7px 13px 10px;
      border-top: 1px solid var(--faint);
      align-items: center;
    }
    .evt-by { flex: 1; font-size: .7rem; color: var(--muted); }
    .map-btn {
      display: inline-flex; align-items: center;
      font-size: .76rem; padding: 4px 9px;
      background: transparent; color: var(--muted);
      border: 1px solid var(--border);
      border-radius: var(--r-md); cursor: pointer;
      font-weight: 500; white-space: nowrap;
      font-family: var(--font);
      transition: background .12s, color .12s;
    }
    .map-btn:hover { background: var(--hover); color: var(--text); }
    .map-frame { width: 100%; height: 185px; border: none; border-top: 1px solid var(--border); display: none; }
    .map-frame.open { display: block; }

    /* Add event */
    .add-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 9px 13px;
      background: none;
      border: 1.5px dashed var(--border);
      border-radius: var(--r-lg);
      cursor: pointer; color: var(--muted);
      font-size: .84rem; font-weight: 500;
      font-family: var(--font);
      width: 100%; margin-top: 10px;
      transition: all .12s;
    }
    .add-btn:hover { border-color: #c4c3bf; color: var(--text); background: var(--sb-bg); }

    /* ── DRIVING CONNECTOR ── */
    /* Same flex structure as tl-item so columns align perfectly */
    .drive-connector {
      display: flex;
      gap: 0;
      margin-bottom: 0;
      align-items: stretch;
    }
    /* Spacer matching .tl-time width */
    .drive-c-spacer {
      width: 56px; flex-shrink: 0;
    }
    /* Dot column: continuous line through connector */
    .drive-c-dot-col {
      width: 21px; flex-shrink: 0;
      display: flex; flex-direction: column; align-items: center;
    }
    .drive-c-line {
      width: 1px; flex: 1; background: var(--border);
    }
    /* Pill area */
    .drive-c-body {
      flex: 1; margin-left: 8px;
      display: flex; align-items: center;
      padding: 6px 0;
    }
    .drive-pill {
      display: inline-flex; align-items: center; gap: 5px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 6px; padding: 4px 12px;
      font-size: .72rem; color: var(--muted); font-weight: 500;
      cursor: pointer; transition: all .12s; text-decoration: none;
      white-space: nowrap;
    }
    .drive-pill:hover { background: var(--hover); color: var(--text); border-color: #c4c3bf; }
    .drive-pill.loading { animation: pulse 1.2s infinite; cursor: default; }
    .drive-pill.no-data { cursor: default; font-size: .68rem; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    /* ── CHECKLIST ── */
    .checklist-section { padding: 4px 13px 10px; border-top: 1px solid var(--faint); }
    .checklist-label {
      font-size: .7rem; font-weight: 600; color: var(--muted);
      margin-bottom: 5px; display: flex; align-items: center;
      justify-content: space-between;
    }
    .cl-progress { color: var(--accent); }
    .cl-item { display: flex; align-items: center; gap: 7px; padding: 3px 0; }
    .cl-cb { width: 14px; height: 14px; accent-color: var(--accent); cursor: pointer; flex-shrink: 0; border-radius: 3px; }
    .cl-text { font-size: .83rem; color: var(--text); flex: 1; transition: color .15s; }
    .cl-text.done { text-decoration: line-through; color: var(--muted); }
    /* modal checklist */
    .fcl-wrap { border: 1px solid var(--border); border-radius: var(--r-md); padding: 8px 10px; background: var(--sb-bg); }
    .fcl-item { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
    .fcl-item:last-child { margin-bottom: 0; }
    .fcl-inp { flex: 1; padding: 5px 8px; border: 1px solid var(--border); border-radius: var(--r-md); font-size: .84rem; font-family: var(--font); background: var(--bg); }
    .fcl-inp:focus { outline: none; border-color: var(--accent); }
    .fcl-del { background: none; border: none; color: var(--muted); font-size: 1rem; cursor: pointer; padding: 0 2px; }
    .fcl-del:hover { color: var(--red); }
    .fcl-add { background: none; border: none; color: var(--accent); font-size: .79rem; font-weight: 500; cursor: pointer; padding: 5px 0 0; font-family: var(--font); }
    .fcl-add:hover { text-decoration: underline; }
    .fcl-add:disabled { color: var(--muted); cursor: not-allowed; text-decoration: none; }

    /* ── CREDENTIALS ── */
    .cred-filters { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 16px; }
    .cf-btn {
      padding: 4px 12px; border-radius: 20px;
      border: 1px solid var(--border); background: var(--bg);
      font-size: .78rem; font-weight: 500; cursor: pointer;
      color: var(--muted); font-family: var(--font); transition: all .12s;
    }
    .cf-btn:hover { background: var(--hover); color: var(--text); }
    .cf-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }
    .cred-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(240px,1fr)); gap: 10px; }
    .cred-card {
      border: 1px solid var(--border); border-radius: var(--r-lg);
      padding: 14px; transition: border-color .12s, box-shadow .12s;
    }
    .cred-card:hover { border-color: #c4c3bf; box-shadow: 0 1px 6px rgba(0,0,0,.06); }
    .cc-head { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 9px; }
    .cc-icon { font-size: 1.5rem; flex-shrink: 0; line-height: 1.2; }
    .cc-badge { font-size: .65rem; font-weight: 600; padding: 2px 7px; border-radius: 3px; }
    .cc-title { font-weight: 600; font-size: .9rem; margin-top: 3px; line-height: 1.3; }
    .cc-desc  { font-size: .81rem; color: var(--muted); margin-bottom: 6px; line-height: 1.5; }
    .cc-code  { font-size: .76rem; background: var(--sb-bg); color: var(--text); padding: 3px 8px; border-radius: var(--r-md); margin-bottom: 6px; font-family: monospace; display: inline-block; }
    .cc-dates { font-size: .74rem; color: var(--muted); margin-bottom: 7px; }
    .cc-link  { display: inline-flex; align-items: center; gap: 4px; font-size: .78rem; color: var(--accent); text-decoration: none; font-weight: 500; margin-bottom: 8px; word-break: break-all; }
    .cc-link:hover { text-decoration: underline; }
    .cc-foot  { display: flex; gap: 5px; border-top: 1px solid var(--faint); padding-top: 8px; }
    /* cred image */
    .cc-img { width:100%; height:160px; object-fit:cover; border-radius:var(--r-md); margin-bottom:9px; cursor:pointer; display:block; }
    /* upload zone */
    .upload-zone {
      border: 1.5px dashed var(--border); border-radius: var(--r-md);
      padding: 18px; text-align: center; cursor: pointer;
      color: var(--muted); font-size: .82rem; transition: all .12s;
      position: relative;
    }
    .upload-zone:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-lt); }
    .upload-zone input[type=file] { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
    .upload-preview { width:100%; height:140px; object-fit:cover; border-radius:var(--r-md); display:block; margin-bottom:6px; }
    .upload-clear { font-size:.75rem; color:var(--red); cursor:pointer; background:none; border:none; font-family:var(--font); }
    .upload-clear:hover { text-decoration:underline; }
    .upload-spinner { display:inline-block; width:16px; height:16px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite; vertical-align:middle; margin-right:5px; }
    .cred-top { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
    .cred-top h2 { font-size: 1.1rem; font-weight: 700; }
    .page-title { font-size: 1.6rem; font-weight: 700; margin-bottom: 20px; }

    /* Type badges */
    .t-meal        { background: #fef3c7; color: #92400e; }
    .t-attraction  { background: #dbeafe; color: #1e40af; }
    .t-activity    { background: #d1fae5; color: #065f46; }
    .t-transport   { background: #f3e8ff; color: #5b21b6; }
    .t-accommodation { background: #ffe4e6; color: #9f1239; }
    .c-flight   { background: #dbeafe; color: #1e40af; }
    .c-hotel    { background: #fce7f3; color: #9d174d; }
    .c-car      { background: #d1fae5; color: #065f46; }
    .c-activity { background: #fef3c7; color: #92400e; }
    .c-other    { background: var(--sb-bg); color: #57534e; }
    .c-ticket   { background: #fef9c3; color: #854d0e; }
    .c-booking  { background: #ede9fe; color: #5b21b6; }

    /* ── MODAL ── */
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.35); display: flex; align-items: center; justify-content: center; z-index: 900; padding: 16px; }
    .overlay.hidden { display: none; }
    .modal-box {
      background: var(--bg);
      border-radius: var(--r-lg);
      border: 1px solid var(--border);
      padding: 24px;
      width: min(500px, 100%);
      max-height: 92vh;
      overflow-y: auto;
      box-shadow: 0 8px 40px rgba(0,0,0,.16);
      animation: popIn .18s ease;
    }

  localStorage.setItem('ok_name',  name)
  localStorage.setItem('ok_color', color)
  // cookie 備援（https:// 環境）
  try {
    const exp = new Date(Date.now() + 90*864e5).toUTCString()
    document.cookie = `ok_name=${encodeURIComponent(name)};expires=${exp};path=/;SameSite=Lax`
    document.cookie = `ok_color=${encodeURIComponent(color)};expires=${exp};path=/;SameSite=Lax`
  } catch(_) {}
}
function loadUser(key) {
  // 優先 localStorage
  const ls = localStorage.getItem(key)
  if (ls) return ls
  // fallback cookie
  try {
    const m = document.cookie.match('(?:^|; )'+key+'=([^;]*)')
    return m ? decodeURIComponent(m[1]) : null
  } catch(_) { return null }
}
function clearUser() {
  localStorage.removeItem('ok_name')

async function loadDays() {
  const { data } = await db.from('days').select('*').order('day_number')
  if (!data || data.length === 0) { await seed(); return loadDays() }
  days = data
}

async function seed() {
  const { data: dd } = await db.from('days').insert(SEED_DAYS).select()
  if (!dd) return
  const map = {}; dd.forEach(d => map[d.day_number] = d.id)
  const evts = SEED_EVTS.map(({dn,ts,desc,addr,oi,...r}) => ({
    ...r, day_id:map[dn], time_start:ts, description:desc, address:addr,
    order_index:oi, created_by:'System'
  }))
  await db.from('events').insert(evts)
  await db.from('credentials').insert(SEED_CREDS)
  toast('✅ 行程資料初始化完成！')
}

async function loadAllEvts() {
  const { data } = await db.from('events').select('*').order('order_index')
  evtMap = {}
  days.forEach(d => evtMap[d.day_number] = [])
  if (data) {
    data.forEach(e => {
      const d = days.find(x => x.id === e.day_id)
      if (d) { evtMap[d.day_number] = evtMap[d.day_number] || []; evtMap[d.day_number].push(e) }
    })
    Object.keys(evtMap).forEach(k => evtMap[k].sort((a,b) => (a.time_start||'').localeCompare(b.time_start||'')))
  }
}

async function loadCreds() {
  const { data } = await db.from('credentials').select('*').order('created_at')
  creds = data || []
}

function setupRealtime() {
  db.channel('db-changes')
    .on('postgres_changes',{event:'UPDATE',schema:'public',table:'days'}, async p => {
      const idx = days.findIndex(d => d.id === p.new.id)
      if (idx !== -1) { days[idx] = { ...days[idx], ...p.new }; renderTabs(); if(curTab==='day') renderPanel() }
    })
    .on('postgres_changes',{event:'*',schema:'public',table:'events'}, async p => {
      await loadAllEvts()
      if (curTab==='day') renderPanel()
      const act = {INSERT:'新增了',UPDATE:'更新了',DELETE:'刪除了'}[p.eventType]
      toast(`✏️ ${p.new?.created_by||'有人'} ${act}：${p.new?.title||p.old?.title||'事件'}`)
    })
    .on('postgres_changes',{event:'*',schema:'public',table:'credentials'}, async () => {
      await loadCreds()
      if (curTab==='cred') renderPanel()
    })
    .subscribe()
}

function setupPresence() {
  const ch = db.channel('trip-presence')
  ch.on('presence',{event:'sync'},() => {
    online = Object.values(ch.presenceState()).flat()
    renderPresence()
  }).subscribe(async s => {
    if (s==='SUBSCRIBED') await ch.track({user_name:userName,color:userColor,ts:Date.now()})
  })
}

function renderPresence() {
  const dots = online.length
    ? online.map(u=>`<div class="p-dot" style="background:${u.color}" title="${u.user_name}">${u.user_name[0]}</div>`).join('')
    : '<span class="p-label">只有你在線上</span>'
  document.getElementById('presence-bar').innerHTML = dots
  const mob = document.getElementById('presence-bar-mob')
  if (mob) mob.innerHTML = online.map(u=>`<div class="p-dot" style="background:${u.color};width:22px;height:22px;font-size:.6rem" title="${u.user_name}">${u.user_name[0]}</div>`).join('')
}

function renderDay() {
  const day = days.find(d => d.day_number === curDay)
  if (!day) return
  const evts = evtMap[curDay] || []
  const routeUrl = buildRoute(evts)
  let timelineHtml = ''
  if (evts.length) {
    evts.forEach((e, i) => {
      timelineHtml += evtCard(e, day)
      if (i < evts.length - 1) {
        const next = evts[i + 1]
        timelineHtml += driveConnector(e, next)
      }
    })
  } else {
    timelineHtml = '<div class="empty">還沒有行程，點下方按鈕新增！</div>'
  }

  document.getElementById('main').innerHTML = `
    <div class="day-hero panel-anim">
      <div class="day-title-row">
        <span class="day-icon">${day.icon || DEFAULT_DAY_ICON(day.day_number)}</span>
        <h1 class="day-h1">${day.title}</h1>
        <button class="btn btn-primary btn-sm" onclick="openAddEvt('${day.id}')" style="margin-left:auto">＋ 新增行程</button>
      </div>
      <div class="day-theme">${day.theme||''}</div>
      <div class="day-actions">
        <button class="btn btn-ghost btn-sm" onclick="openEditDay()" title="編輯標題">編輯</button>
        ${routeUrl ? `<a href="${routeUrl}" target="_blank" class="btn btn-route btn-sm">查看今日路線</a>` : ''}
      </div>
    </div>
    <div class="timeline">${timelineHtml}</div>
  `
  // Fetch driving info for all connectors after render
  evts.forEach((e, i) => {
    if (i < evts.length - 1) fetchDriving(e, evts[i + 1])
  })
}

const TYPE_CN = {meal:'餐廳',attraction:'景點',activity:'活動',transport:'交通',accommodation:'住宿'}

/* ── DRIVING DISTANCE ── */
const driveCache = {}   // key: "lat1,lng1->lat2,lng2"

function driveKey(a, b) { return `${a.lat},${a.lng}->${b.lat},${b.lng}` }

function driveConnector(a, b) {
  if (!a.lat || !a.lng || !b.lat || !b.lng) return ''
  const key = driveKey(a, b)
  const id  = `drive-${key.replace(/[^0-9.]/g,'_')}`
  const cached = driveCache[key]
  let pill
  if (cached === 'err') {
    pill = `<span class="drive-pill no-data">無法取得距離</span>`
  } else if (cached) {
    pill = drivePillHtml(cached, a, b)
  } else {
    pill = `<span class="drive-pill loading" id="${id}">計算中...</span>`
  }
  return `
  <div class="drive-connector">
    <div class="drive-c-spacer"></div>
    <div class="drive-c-dot-col"><div class="drive-c-line"></div></div>
    <div class="drive-c-body">${pill}</div>
  </div>`
}

function drivePillHtml(data, a, b) {
  const dirUrl = `https://www.google.com/maps/dir/${a.lat},${a.lng}/${b.lat},${b.lng}`
  return `<a class="drive-pill" href="${dirUrl}" target="_blank" title="在 Google Maps 開啟導航">🚗 ${data.dist} · ${data.time}</a>`
}

async function fetchDriving(a, b) {
  if (!a.lat || !a.lng || !b.lat || !b.lng) return
  const key = driveKey(a, b)
  if (driveCache[key]) return   // already cached
  driveCache[key] = null        // mark in-flight
  const id = `drive-${key.replace(/[^0-9.]/g,'_')}`

  try {
    const url = `https://router.project-osrm.org/route/v1/driving/${a.lng},${a.lat};${b.lng},${b.lat}?overview=false`
    const res  = await fetch(url)
    const json = await res.json()
    if (json.code !== 'Ok' || !json.routes?.length) throw new Error('no route')

    const meters  = json.routes[0].distance
    const seconds = json.routes[0].duration
    const dist = meters  < 1000 ? `${Math.round(meters)} m` : `${(meters/1000).toFixed(1)} km`
    const time = seconds < 60   ? `${Math.round(seconds)} 秒`
               : seconds < 3600 ? `${Math.round(seconds/60)} 分鐘`
               : `${Math.floor(seconds/3600)} 小時 ${Math.round((seconds%3600)/60)} 分鐘`

    driveCache[key] = { dist, time }
  } catch(_) {
    driveCache[key] = 'err'
  }

  // Update DOM element if it still exists
  const el = document.getElementById(id)
  if (!el) return
  const pill = driveCache[key] === 'err'
    ? `<span class="drive-pill no-data">無法取得距離</span>`
    : drivePillHtml(driveCache[key], a, b)
  el.closest('.drive-c-body').innerHTML = pill
}

function evtCard(e, day) {
  const mapsHref = e.google_maps_url || (e.lat&&e.lng ? `https://www.google.com/maps/search/?api=1&query=${e.lat},${e.lng}` : '')
  const embedUrl = e.lat&&e.lng ? `https://maps.google.com/maps?q=${e.lat},${e.lng}&z=15&output=embed&hl=zh-TW` : ''
  const timeStr = e.time_start ? e.time_start.slice(0,5) : '—'
  const timeEnd = e.time_end   ? e.time_end.slice(0,5)   : ''
  return `
  <div class="tl-item">
    <div class="tl-time">
      <span class="tl-time-start">${timeStr}</span>
      ${timeEnd ? `<span class="tl-time-end">${timeEnd}</span>` : ''}
    </div>
    <div class="tl-dot-wrap">
      <div class="tl-dot" style="border-color:${day.color}"></div>
      <div class="tl-dot-line"></div>
    </div>
    <div class="evt-card" style="margin-left:8px">
      <div class="evt-head">
        <div class="evt-emoji">${e.emoji||'📍'}</div>
        <div class="evt-info">
          <div class="evt-title">${e.title}</div>
          <div class="evt-meta">
            <span class="type-badge t-${e.type}">${TYPE_CN[e.type]||e.type}</span>
          </div>
        </div>
      </div>
      ${e.description ? `<div class="evt-desc">${e.description}</div>` : ''}
      ${renderChecklist(e)}

      <div class="evt-foot">
        <span class="evt-by">by ${e.created_by||'—'}</span>

function toggleMap(id) {
  const frame = document.getElementById('map-'+id)
  if (!frame) return
  const isOpen = frame.classList.toggle('open')
  const btn = frame.previousElementSibling?.querySelector('.map-btn')
  if (btn) {
    btn.style.background = isOpen ? 'var(--hover)' : ''
    btn.style.color      = isOpen ? 'var(--text)'  : ''
  }
}

/* ── CHECKLIST CARD RENDER ── */
function renderChecklist(e) {
  const items = Array.isArray(e.checklist) ? e.checklist : []
  if (!items.length) return ''
  const done = items.filter(i=>i.done).length
  return `
  <div class="checklist-section">
    <div class="checklist-label">
      <span>📋 待辦記事</span>
      <span class="cl-progress">${done}/${items.length}</span>
    </div>
    ${items.map((item,idx) => `
      <div class="cl-item">
        <input type="checkbox" class="cl-cb" ${item.done?'checked':''} onchange="toggleCheck('${e.id}',${idx},this.checked)"/>
        <span class="cl-text ${item.done?'done':''}" id="cl-text-${e.id}-${idx}">${escHtml(item.text)}</span>
      </div>`).join('')}
  </div>`
}

async function toggleCheck(evtId, idx, checked) {
  // Find the event across all days
  let evt = null
  Object.values(evtMap).forEach(arr => { const f=arr.find(x=>x.id===evtId); if(f) evt=f })
  if (!evt) return
  const items = Array.isArray(evt.checklist) ? [...evt.checklist] : []
  if (!items[idx]) return
  items[idx] = { ...items[idx], done: checked }
  // Optimistic UI
  evt.checklist = items
  const textEl = document.getElementById(`cl-text-${evtId}-${idx}`)
  if (textEl) textEl.classList.toggle('done', checked)
  // Update progress label
  const section = textEl?.closest('.checklist-section')
  if (section) {
    const prog = section.querySelector('.cl-progress')
    const done = items.filter(i=>i.done).length
    if (prog) prog.textContent = `${done}/${items.length}`
  }
  await db.from('events').update({ checklist: items, updated_at: new Date().toISOString() }).eq('id', evtId)
}

function buildRoute(evts) {
  const pts = evts.filter(e=>e.lat&&e.lng)
  if (pts.length < 2) return ''
  return 'https://www.google.com/maps/dir/'+pts.map(e=>`${e.lat},${e.lng}`).join('/')
}

function lighten(hex) {
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16)
  return `rgb(${Math.min(r+55,255)},${Math.min(g+55,255)},${Math.min(b+55,255)})`
}

// ════════════════════════════════════════════════════
// CHECKLIST MODAL MANAGEMENT
// ════════════════════════════════════════════════════
function renderClModal(items) {
  const list = document.getElementById('f-cl-list')
  list.innerHTML = items.map((item,i) => `
    <div class="fcl-item" id="fcl-row-${i}">
      <input class="fcl-inp" type="text" placeholder="記事內容..." value="${escHtml(item.text)}" maxlength="60" id="fcl-inp-${i}"/>
      <button type="button" class="fcl-del" onclick="removeClItem(${i})" title="刪除">×</button>
    </div>`).join('')
  document.getElementById('f-cl-add').disabled = items.length >= 10
}

function getClItems() {
  const rows = document.querySelectorAll('#f-cl-list .fcl-item')
  return Array.from(rows).map((row, i) => {
    const inp = document.getElementById(`fcl-inp-${i}`)
    return inp ? { text: inp.value.trim(), done: false } : null
  }).filter(x => x && x.text)
}

function addClItem() {
  const rows = document.querySelectorAll('#f-cl-list .fcl-item')
  if (rows.length >= 10) return
  const i = rows.length
  const div = document.createElement('div')
  div.className = 'fcl-item'; div.id = `fcl-row-${i}`
  div.innerHTML = `<input class="fcl-inp" type="text" placeholder="記事內容..." maxlength="60" id="fcl-inp-${i}"/>
    <button type="button" class="fcl-del" onclick="removeClItem(${i})" title="刪除">×</button>`
  document.getElementById('f-cl-list').appendChild(div)
  document.getElementById(`fcl-inp-${i}`).focus()
  document.getElementById('f-cl-add').disabled = (i+1) >= 10
}

function removeClItem(idx) {
  // Re-collect current values before removing
  const rows = document.querySelectorAll('#f-cl-list .fcl-item')
  const vals = Array.from(rows).map((_, i) => {
    const el = document.getElementById(`fcl-inp-${i}`); return el ? el.value : ''
  })
  vals.splice(idx, 1)
  const items = vals.map(t => ({ text: t, done: false }))
  renderClModal(items)
  // Restore done state lost during re-render is not needed here (modal always resets done to false visually)
}

function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
}

// ════════════════════════════════════════════════════
// EVENT CRUD
// ════════════════════════════════════════════════════
function openAddEvt(dayId) {
  editEvtId=null; editDayId=dayId
  document.getElementById('evt-modal-title').textContent='新增行程事件'
  ;['f-type','f-emoji','f-title','f-tstart','f-tend','f-desc','f-addr','f-lat','f-lng','f-maps'].forEach(id=>{
    const el=document.getElementById(id); if(el.tagName==='SELECT') el.value='attraction'; else el.value=''
  })
  renderClModal([])
  document.getElementById('evt-del-btn').style.display='none'
  document.getElementById('evt-overlay').classList.remove('hidden')
}

function openEditEvt(id) {
  let e=null; Object.values(evtMap).forEach(arr=>{const f=arr.find(x=>x.id===id); if(f) e=f})
  if (!e) return
  editEvtId=id; editDayId=e.day_id
  document.getElementById('evt-modal-title').textContent='編輯行程事件'
  document.getElementById('f-type').value    = e.type||'attraction'
  document.getElementById('f-emoji').value   = e.emoji||''
  document.getElementById('f-title').value   = e.title||''
  document.getElementById('f-tstart').value  = e.time_start?.slice(0,5)||''
  document.getElementById('f-tend').value    = e.time_end?.slice(0,5)||''
  document.getElementById('f-desc').value    = e.description||''
  document.getElementById('f-addr').value    = e.address||''
  document.getElementById('f-lat').value     = e.lat||''
  document.getElementById('f-lng').value     = e.lng||''
  document.getElementById('f-maps').value    = e.google_maps_url||''
  renderClModal(Array.isArray(e.checklist) ? e.checklist : [])
  document.getElementById('evt-del-btn').style.display='inline-flex'
  document.getElementById('evt-overlay').classList.remove('hidden')
}

function closeEvtModal() { document.getElementById('evt-overlay').classList.add('hidden') }

async function saveEvt() {
  const title=document.getElementById('f-title').value.trim()
  if (!title) { document.getElementById('f-title').focus(); return }

  // Merge checklist items — preserve existing done state by matching text
  let existingCl = []
  if (editEvtId) {
    let e=null; Object.values(evtMap).forEach(arr=>{const f=arr.find(x=>x.id===editEvtId); if(f) e=f})
    existingCl = Array.isArray(e?.checklist) ? e.checklist : []
  }
  const clItems = Array.from(document.querySelectorAll('#f-cl-list .fcl-item')).map((_, i) => {
    const inp = document.getElementById(`fcl-inp-${i}`)
    const text = inp ? inp.value.trim() : ''
    if (!text) return null
    const existing = existingCl.find(x=>x.text===text)
    return { text, done: existing ? existing.done : false }
  }).filter(Boolean)

  const payload = {
    type:            document.getElementById('f-type').value,
    emoji:           document.getElementById('f-emoji').value.trim()||'📍',
    title,
    time_start:      document.getElementById('f-tstart').value||null,
    time_end:        document.getElementById('f-tend').value||null,
    description:     document.getElementById('f-desc').value.trim()||null,
    address:         document.getElementById('f-addr').value.trim()||null,
    lat:             parseFloat(document.getElementById('f-lat').value)||null,
    lng:             parseFloat(document.getElementById('f-lng').value)||null,
    google_maps_url: document.getElementById('f-maps').value.trim()||null,
    checklist:       clItems,
    updated_at:      new Date().toISOString(),
  }

  let error
  if (editEvtId) {
    ;({ error } = await db.from('events').update(payload).eq('id', editEvtId))
  } else {
    payload.day_id      = editDayId
    payload.order_index = (evtMap[curDay]||[]).length + 1
    payload.created_by  = userName
    ;({ error } = await db.from('events').insert(payload))
  }

  if (error) {
    // checklist 欄位不存在時，移除後重試
    if (error.code === '42703' || error.message?.includes('checklist')) {
      delete payload.checklist
      let editEvtIdCopy = editEvtId
      if (editEvtIdCopy) {
        ;({ error } = await db.from('events').update(payload).eq('id', editEvtIdCopy))
      } else {
        ;({ error } = await db.from('events').insert(payload))
      }
      if (!error) {
        toast('⚠️ 儲存成功，但請在 Supabase SQL Editor 執行：\nalter table events add column if not exists checklist jsonb default \'[]\'::jsonb;')
      }
    }
    if (error) {
      toast(`❌ 儲存失敗：${error.message}`)
      console.error('saveEvt error:', error)
      return
    }
  }

  closeEvtModal()
}

async function deleteEvt() {
  if (!editEvtId||!confirm('確定要刪除這個行程事件嗎？')) return
  await db.from('events').delete().eq('id',editEvtId)
  closeEvtModal()
}

// ════════════════════════════════════════════════════
// CREDENTIAL CRUD
// ════════════════════════════════════════════════════
let credImgFile = null      // pending File object
let credImgUrl  = null      // existing URL (edit mode)

function resetCredUpload(existingUrl = null) {
  credImgFile = null
  credImgUrl  = existingUrl
  const zone = document.getElementById('c-upload-zone')
  document.getElementById('c-img-file').value = ''
  if (existingUrl) {
    zone.innerHTML = `
      <img class="upload-preview" src="${existingUrl}" alt="已上傳圖片"/>
      <button class="upload-clear" onclick="clearCredImg(event)">✕ 移除圖片</button>
      <input type="file" id="c-img-file" accept="image/*" onchange="previewCredImg(event)" onclick="event.stopPropagation()" style="display:none"/>`
  } else {
    zone.innerHTML = `
      <input type="file" id="c-img-file" accept="image/*" onchange="previewCredImg(event)" onclick="event.stopPropagation()"/>
      <div id="c-upload-hint">📎 點擊或拖曳上傳圖片</div>`
    zone.onclick = () => document.getElementById('c-img-file').click()
  }
}

function previewCredImg(e) {
  const file = e.target.files[0]; if (!file) return
  credImgFile = file
  const url = URL.createObjectURL(file)
  const zone = document.getElementById('c-upload-zone')
  zone.innerHTML = `
    <img class="upload-preview" src="${url}" alt="預覽"/>
    <button class="upload-clear" onclick="clearCredImg(event)">✕ 移除圖片</button>
    <input type="file" id="c-img-file" accept="image/*" onchange="previewCredImg(event)" onclick="event.stopPropagation()" style="display:none"/>`
  zone.onclick = () => document.getElementById('c-img-file').click()
}

function clearCredImg(e) {
  e.stopPropagation()
  credImgFile = null; credImgUrl = null
  const zone = document.getElementById('c-upload-zone')
  zone.innerHTML = `
    <input type="file" id="c-img-file" accept="image/*" onchange="previewCredImg(event)" onclick="event.stopPropagation()"/>
    <div id="c-upload-hint">📎 點擊或拖曳上傳圖片</div>`
  zone.onclick = () => document.getElementById('c-img-file').click()
}

function openAddCred() {
  editCredId=null
  document.getElementById('cred-modal-title').textContent='新增憑證'
  ;['c-type','c-confirm','c-title','c-desc','c-link','c-from','c-until'].forEach(id=>{
    const el=document.getElementById(id); if(el.tagName==='SELECT') el.value='flight'; else el.value=''
  })
  resetCredUpload()
  document.getElementById('cred-del-btn').style.display='none'
  document.getElementById('cred-overlay').classList.remove('hidden')
}

function openEditCred(id) {
  const c=creds.find(x=>x.id===id); if(!c) return
  editCredId=id
  document.getElementById('cred-modal-title').textContent='編輯憑證'
  document.getElementById('c-type').value    = c.type||'other'
  document.getElementById('c-confirm').value = c.confirmation_number||''
  document.getElementById('c-title').value   = c.title||''
  document.getElementById('c-desc').value    = c.description||''
  document.getElementById('c-link').value    = c.link_url||''
  document.getElementById('c-from').value    = c.valid_from||''
  document.getElementById('c-until').value   = c.valid_until||''
  resetCredUpload(c.image_url || null)
  document.getElementById('cred-del-btn').style.display='inline-flex'
  document.getElementById('cred-overlay').classList.remove('hidden')
}

function closeCredModal() {
  document.getElementById('cred-overlay').classList.add('hidden')
  credImgFile = null; credImgUrl = null
}

async function saveCred() {
  const title=document.getElementById('c-title').value.trim()
  if (!title) { document.getElementById('c-title').focus(); return }

  // Upload image if new file selected
  let imageUrl = credImgUrl   // keep existing or null
  if (credImgFile) {
    const saveBtn = document.getElementById('cred-save-btn')
    saveBtn.disabled = true
    saveBtn.innerHTML = '<span class="upload-spinner"></span>上傳中...'
    const ext  = credImgFile.name.split('.').pop()
    const path = `cred-${Date.now()}.${ext}`
    const { data: upData, error: upErr } = await db.storage
      .from('cred-images').upload(path, credImgFile, { upsert: true })
    saveBtn.disabled = false; saveBtn.innerHTML = '儲存'
    if (upErr) { toast(`❌ 圖片上傳失敗：${upErr.message}`); return }
    const { data: pubData } = db.storage.from('cred-images').getPublicUrl(path)
    imageUrl = pubData.publicUrl
  } else if (credImgUrl === null && editCredId) {
    // user cleared the image — set to null
    imageUrl = null
  }

  const payload = {
    type:                document.getElementById('c-type').value,
    title,
    description:         document.getElementById('c-desc').value.trim()||null,
    confirmation_number: document.getElementById('c-confirm').value.trim()||null,
    link_url:            document.getElementById('c-link').value.trim()||null,
    valid_from:          document.getElementById('c-from').value||null,
    valid_until:         document.getElementById('c-until').value||null,
    image_url:           imageUrl,
  }
  const { error } = editCredId
    ? await db.from('credentials').update(payload).eq('id', editCredId)
    : await db.from('credentials').insert(payload)
  if (error) { toast(`❌ 儲存失敗：${error.message}`); console.error('saveCred error:', error); return }
  closeCredModal()
}

async function deleteCred() {
  if (!editCredId||!confirm('確定要刪除這個憑證嗎？')) return
  // Delete image from storage if exists
  const c = creds.find(x=>x.id===editCredId)
  if (c?.image_url) {
    const path = c.image_url.split('/cred-images/')[1]
    if (path) await db.storage.from('cred-images').remove([path])
  }
  await db.from('credentials').delete().eq('id',editCredId)
  closeCredModal()
}

  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show')
  setTimeout(()=>t.classList.remove('show'),3200)
}

// DAY EDIT
// ════════════════════════════════════════════════════

const DAY_ICON_PRESETS = ['🗺','🏖','🦈','🕊️','🏝','🏯','🌺','🤿','🚗','🛍️','🍜','🌊','🎡','🏄','🌙','☀️','🎭','🍱']

function openEditDay() {
  const day = days.find(d => d.day_number === curDay)
  if (!day) return
  const curIcon = day.icon || DEFAULT_DAY_ICON(day.day_number)
  document.getElementById('d-icon').value  = curIcon
  document.getElementById('d-date').value  = day.trip_date || ''
  document.getElementById('d-title').value = day.title || ''
  document.getElementById('d-theme').value = day.theme || ''
  // render preset buttons
  document.getElementById('d-icon-presets').innerHTML = DAY_ICON_PRESETS.map(e =>
    `<button type="button" onclick="pickDayIcon('${e}')" title="${e}"
      style="font-size:1.3rem;background:${curIcon===e?'var(--accent-lt)':'none'};
      border:1.5px solid ${curIcon===e?'var(--accent)':'var(--border)'};
      border-radius:var(--r-md);padding:2px 5px;cursor:pointer;line-height:1.4">${e}</button>`
  ).join('')
  document.getElementById('day-overlay').classList.remove('hidden')
  setTimeout(() => document.getElementById('d-title').select(), 50)
}

function pickDayIcon(emoji) {
  document.getElementById('d-icon').value = emoji
  // update preset highlight
  document.querySelectorAll('#d-icon-presets button').forEach(btn => {
    const active = btn.textContent === emoji
    btn.style.background     = active ? 'var(--accent-lt)' : 'none'
    btn.style.borderColor    = active ? 'var(--accent)'    : 'var(--border)'
  })
}


function closeDayModal() { document.getElementById('day-overlay').classList.add('hidden') }

async function saveDay() {
  const title = document.getElementById('d-title').value.trim()
  if (!title) { document.getElementById('d-title').focus(); return }
  const day = days.find(d => d.day_number === curDay)
  if (!day) return
  const payload = {
    title,
    icon:      document.getElementById('d-icon').value.trim() || null,
    theme:     document.getElementById('d-theme').value.trim() || null,
    trip_date: document.getElementById('d-date').value || null,
  }
  const { error } = await db.from('days').update(payload).eq('id', day.id)
  if (error) { toast(`❌ 儲存失敗：${error.message}`); return }
  Object.assign(day, payload)
  closeDayModal()
  renderTabs()
  renderPanel()
}

function changeUser() {
  clearUser()
  userName  = null
  userColor = COLORS[0]
  // 重設輸入框
  document.getElementById('name-inp').value = ''
  initColorRow()
  document.getElementById('name-overlay').classList.remove('hidden')
}
